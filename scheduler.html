<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>訪問スケジューラ</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>window._gMapsLoaded = false; function _gMapsCallback() { window._gMapsLoaded = true; }</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic UI",Meiryo,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}

/* ── ログイン ── */
#login-screen{position:fixed;inset:0;background:#1e3d6e;display:flex;align-items:center;justify-content:center;z-index:999}
.login-box{background:white;padding:40px 36px;border-radius:18px;box-shadow:0 16px 48px rgba(0,0,0,0.25);width:340px;text-align:center}
.login-box h1{font-size:20px;color:#1e3d6e;margin-bottom:6px}
.login-box p{font-size:13px;color:#64748b;margin-bottom:22px}
.login-input{width:100%;padding:12px 14px;font-size:16px;border:2px solid #e2e8f0;border-radius:10px;outline:none;font-family:inherit;background:#f8fafc;color:#1e293b}
.login-input:focus{border-color:#1e3d6e}
.login-input.error{border-color:#c53030;animation:shake 0.3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.result-fadein{animation:fadeInUp 0.35s ease both}
.login-btn{width:100%;margin-top:14px;padding:12px;background:#1e3d6e;color:white;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.login-btn:hover{background:#172f55}
#login-error{color:#c53030;font-size:12px;margin-top:8px;height:14px}

/* ── ヘッダ ── */
header{background:#1e3d6e;color:white;padding:14px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.brand{font-weight:800;font-size:18px;display:flex;align-items:center;gap:8px}
.brand a{color:#a8c4e5;font-size:12px;text-decoration:none;margin-left:12px;font-weight:500}
.brand a:hover{color:white}
.status{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:13px;color:#a8c4e5}
.status-dot{width:8px;height:8px;border-radius:50%;background:#64748b}
.status-dot.ok{background:#22c55e}
.status-dot.err{background:#ef4444}

/* ── メイン ── */
main{max-width:1100px;margin:24px auto;padding:0 16px}
.card{background:white;border-radius:16px;box-shadow:0 1px 6px rgba(0,0,0,0.06);margin-bottom:18px;overflow:hidden}
.card-header{padding:14px 22px;border-bottom:1px solid #f1f5f9;font-size:13px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.05em}
.card-body{padding:20px 22px}

/* ── 条件パネル ── */
.cond-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}
.cond-item label{display:block;font-size:12px;font-weight:700;color:#64748b;margin-bottom:6px;letter-spacing:0.02em}
.cond-item input[type="time"],.cond-item input[type="date"],.cond-item select{width:100%;padding:9px 12px;font-size:15px;border:2px solid #e2e8f0;border-radius:8px;outline:none;background:#f8fafc;color:#1e293b;font-family:inherit}
.cond-item input:focus,.cond-item select:focus{border-color:#1e3d6e}
.cond-row{display:flex;align-items:center;gap:10px;margin-top:14px;font-size:14px;flex-wrap:wrap}
.cond-row label{display:flex;align-items:center;gap:6px;cursor:pointer}
.cond-row input[type="checkbox"]{width:18px;height:18px;accent-color:#1e3d6e;cursor:pointer}

/* ── 検索 ── */
.search-wrap{position:relative}
.search-input{width:100%;border:2px solid #e2e8f0;border-radius:10px;padding:11px 14px;font-size:15px;font-family:inherit;outline:none;background:#f8fafc;color:#1e293b;transition:border-color 0.15s}
.search-input:focus{border-color:#1e3d6e;background:white}
.search-input::placeholder{color:#cbd5e1}
.suggest-list{position:absolute;top:calc(100% + 2px);left:0;right:0;background:white;border:1.5px solid #1e3d6e;border-radius:12px;box-shadow:0 8px 28px rgba(0,0,0,0.13);z-index:200;overflow:hidden;display:none;max-height:380px;overflow-y:auto}
.suggest-item{display:block;width:100%;text-align:left;background:none;border:none;border-bottom:1px solid #f1f5f9;padding:11px 16px;cursor:pointer;transition:background 0.1s;font-family:inherit;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
.suggest-item:last-child{border-bottom:none}
.suggest-item:hover,.suggest-item.active{background:#edf2fa}
.suggest-item > *{pointer-events:none}
.s-name{font-weight:700;font-size:14px;color:#1e293b}
.s-meta{font-size:11px;color:#64748b;margin-top:2px}
.suggest-empty{padding:14px 16px;color:#94a3b8;text-align:center;font-size:13px}
mark{background:#fef08a;color:inherit;padding:0 2px;border-radius:2px}

/* ── 訪問予定リスト ── */
.visit-list{margin-top:4px}
.visit-item{display:block;padding:10px 0;border-bottom:1px solid #f1f5f9}
.visit-item-top{display:flex;align-items:center;gap:10px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.visit-item-top:active{opacity:0.7}
.visit-item-bottom{display:flex;align-items:center;gap:8px;margin-top:7px;padding-left:40px}
.visit-item:last-child{border-bottom:none}
.visit-num{width:30px;height:30px;border-radius:50%;background:#1e3d6e;color:white;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.visit-info{min-width:0}
.visit-name{font-weight:700;font-size:14px;color:#1e293b}
.visit-cond{font-size:11px;color:#64748b;margin-top:2px;line-height:1.4}
.visit-cond .fixed{color:#92400e;font-weight:700}
.visit-cond .ng{color:#c53030}
.dur-input{width:100%;padding:6px 8px;font-size:13px;border:1.5px solid #e2e8f0;border-radius:6px;outline:none;text-align:center;background:#f8fafc;font-family:inherit}
.dur-input:focus{border-color:#1e3d6e;background:white}
.dur-label{font-size:10px;color:#64748b;text-align:center;margin-top:2px}
.del-btn{width:32px;height:32px;border:none;background:#fee2e2;color:#c53030;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center}
.del-btn:hover{background:#fecaca}
.edit-btn{width:32px;height:32px;border:none;background:#edf2fa;color:#1e3d6e;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.edit-btn:hover{background:#dbeafe}
.s-edit-btn{width:26px;height:26px;border:none;background:none;color:#94a3b8;border-radius:6px;cursor:pointer;font-size:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-left:auto}
.s-edit-btn:hover{background:#edf2fa;color:#1e3d6e}
/* ── 今日だけ制約オーバーライド ── */
.override-btn{border:none;background:#f1f5f9;color:#475569;border-radius:6px;padding:4px 9px;font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0}
.override-btn:hover{background:#fef3c7;color:#92400e}
.override-badge{display:inline-flex;align-items:center;gap:3px;background:#fef3c7;border:1.5px solid #f59e0b;color:#92400e;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;flex-shrink:0}
.override-badge-clear{background:none;border:none;color:#b45309;cursor:pointer;padding:0 0 0 3px;font-size:13px;font-weight:700;line-height:1}
.override-inputs{display:inline-flex;align-items:center;gap:4px;flex-shrink:0}
.override-time{width:84px;font-size:13px;padding:4px 6px;border:1.5px solid #f59e0b;border-radius:6px;font-family:inherit;background:#fffbeb;outline:none}
.override-ok{border:none;background:#f59e0b;color:white;border-radius:6px;padding:4px 8px;font-size:12px;cursor:pointer;font-weight:700;font-family:inherit}
.override-cancel{border:none;background:#f1f5f9;color:#64748b;border-radius:6px;padding:4px 6px;font-size:12px;cursor:pointer;font-family:inherit}
.override-sel{font-size:13px;padding:3px 2px;border:1.5px solid #f59e0b;border-radius:6px;font-family:inherit;background:#fffbeb;outline:none;cursor:pointer;-webkit-appearance:none;text-align:center}
.r-cancel-btn{border:none;background:#fee2e2;color:#c53030;border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;font-family:inherit;margin-top:5px;display:inline-block}
.r-cancel-btn:hover{background:#fecaca}
/* ── 患者制約エディタ ── */
#editor-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
#editor-modal{background:white;border-radius:16px;width:100%;max-width:680px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 16px 48px rgba(0,0,0,0.25)}
.editor-hd{padding:16px 20px;border-bottom:1px solid #f1f5f9;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.editor-hd-title{font-weight:800;font-size:16px;color:#1e293b}
.editor-hd-sub{font-size:11px;color:#94a3b8;margin-top:3px}
.editor-close{width:32px;height:32px;border:none;background:#f1f5f9;border-radius:8px;cursor:pointer;font-size:16px;flex-shrink:0}
.editor-body{overflow-y:auto;padding:18px 20px;flex:1;-webkit-overflow-scrolling:touch}
.editor-sec{margin-bottom:20px}
.editor-sec-title{font-size:11px;font-weight:700;color:#64748b;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #f1f5f9}
.raw-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.raw-label{font-size:11px;font-weight:700;color:#94a3b8;margin-bottom:4px}
.raw-text{font-size:12px;color:#475569;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px;min-height:52px;white-space:pre-wrap;line-height:1.6;word-break:break-all}
.raw-text.empty{color:#cbd5e1;font-style:italic}
.edit-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.edit-label{font-size:12px;font-weight:700;color:#475569;min-width:76px}
.edit-select,.edit-input-text{padding:7px 10px;font-size:13px;border:1.5px solid #e2e8f0;border-radius:8px;outline:none;background:#f8fafc;color:#1e293b;font-family:inherit}
.edit-select:focus,.edit-input-text:focus{border-color:#1e3d6e}
.day-checks{display:flex;gap:5px;flex-wrap:wrap}
.day-chk{display:flex;align-items:center;gap:3px;font-size:12px;cursor:pointer;background:#f1f5f9;padding:4px 8px;border-radius:6px;user-select:none;-webkit-user-select:none}
.day-chk input{accent-color:#1e3d6e}
.windows-list{display:flex;flex-direction:column;gap:6px}
.window-row{display:flex;align-items:center;gap:5px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:7px 10px;flex-wrap:wrap}
.wr-day{width:54px;padding:4px 5px;font-size:12px;border:1px solid #e2e8f0;border-radius:6px;background:white;font-family:inherit}
.wr-time{width:80px;padding:4px 6px;font-size:12px;border:1px solid #e2e8f0;border-radius:6px;background:white;font-family:inherit}
.wr-reason{flex:1;min-width:60px;padding:4px 7px;font-size:12px;border:1px solid #e2e8f0;border-radius:6px;background:white;font-family:inherit}
.win-del{width:24px;height:24px;border:none;background:#fee2e2;color:#c53030;border-radius:6px;cursor:pointer;font-size:12px;flex-shrink:0}
.win-add-btn{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:6px 12px;background:#edf2fa;border:none;border-radius:8px;cursor:pointer;color:#1e3d6e;font-family:inherit;font-weight:700;margin-top:6px}
.notes-ta{width:100%;padding:8px 10px;font-size:13px;border:1.5px solid #e2e8f0;border-radius:8px;outline:none;background:#f8fafc;font-family:inherit;resize:vertical;min-height:56px;color:#1e293b}
.notes-ta:focus{border-color:#1e3d6e}
.editor-ft{padding:14px 20px;border-top:1px solid #f1f5f9;display:flex;gap:10px;justify-content:flex-end}
.ed-cancel{padding:10px 20px;background:#f1f5f9;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;color:#64748b}
.ed-save{padding:10px 24px;background:#1e3d6e;color:white;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.ed-save:disabled{background:#94a3b8;cursor:not-allowed}
#toast-msg{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a6b40;color:white;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:700;z-index:600;pointer-events:none;transition:opacity 0.3s;opacity:0}
@media(max-width:640px){
  /* エディタ */
  .raw-grid{grid-template-columns:1fr}
  #editor-overlay{padding:0;align-items:flex-end}
  #editor-modal{border-radius:16px 16px 0 0;max-height:92vh}
  .editor-ft{flex-direction:row}
  .ed-cancel,.ed-save{flex:1;text-align:center}
}

.empty-msg{padding:30px 16px;text-align:center;color:#94a3b8;font-size:13px}

/* ── 最適化ボタン ── */
.optimize-btn{width:100%;padding:14px;background:#1a6b40;color:white;border:none;border-radius:12px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:6px;letter-spacing:0.02em}
.optimize-btn:hover{background:#155a35}
.optimize-btn:disabled{background:#94a3b8;cursor:not-allowed}

/* ── 結果 ── */
.result-row{display:grid;grid-template-columns:60px 32px 1fr;gap:10px;align-items:center;padding:9px 0;border-bottom:1px solid #f1f5f9;font-size:14px}
.result-row:last-child{border-bottom:none}
.result-row.clinic{background:#f1f5f9;border-radius:8px;padding:9px 12px;border-bottom:none;margin-bottom:4px;margin-top:4px}
.result-row.lunch{background:#fef9c3;border-radius:8px;padding:9px 12px;border-bottom:none;margin-bottom:4px;margin-top:4px}
.r-time{font-weight:700;color:#1e3d6e;font-variant-numeric:tabular-nums}
.r-num{width:26px;height:26px;border-radius:50%;background:#1e3d6e;color:white;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center}
.r-num.clinic{background:#1a6b40}
.r-num.lunch{background:#92400e}
.r-info{min-width:0}
.r-name{font-weight:700;color:#1e293b}
.r-meta{font-size:11px;color:#64748b}
.r-stats{display:flex;gap:8px;margin-top:5px;flex-wrap:wrap}
.r-stat{display:inline-flex;align-items:center;gap:3px;padding:2px 9px;border-radius:10px;font-size:12px;font-weight:700}
.r-stat.travel{background:#edf2fa;color:#1e3d6e}
.r-stat.consult{background:#dcfce7;color:#1a6b40}
.r-warn{color:#c53030;font-size:11px;font-weight:700;margin-left:6px}

.summary-row{display:flex;gap:14px;flex-wrap:wrap;padding:12px 16px;background:#edf2fa;border-radius:10px;margin-top:14px;font-size:13px;color:#1e3d6e;font-weight:700}
.warning-box{background:#fef9c3;border-left:4px solid #ca8a04;padding:12px 14px;border-radius:6px;margin-top:14px;font-size:13px;color:#854d0e}
.row-ng{background:#fff5f5}
.row-warn{background:#fffbeb}
.r-violation{font-size:11px;margin-top:3px;padding:2px 6px;border-radius:4px;display:inline-block}
.r-viol-ng{color:#c53030;background:#fee2e2}
.r-viol-warn{color:#92400e;background:#fef3c7}
.error-box{background:#fee2e2;border-left:4px solid #dc2626;padding:12px 14px;border-radius:6px;margin-top:14px;font-size:13px;color:#7f1d1d}

.gmap-btn{display:block;width:100%;margin-top:14px;padding:14px;background:#1e3d6e;color:white;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;text-decoration:none;text-align:center}
.gmap-btn:hover{background:#172f55}

/* ── モバイル ── */
@media (max-width:640px){
  /* ヘッダ */
  body{overflow:auto}
  header{padding:10px 14px;gap:6px}
  .brand{font-size:15px}
  .brand a{display:none}
  .status{font-size:12px}

  /* メインレイアウト */
  main{margin:10px auto;padding:0 10px}
  .card{border-radius:12px;margin-bottom:12px}
  .card-header{padding:10px 14px;font-size:12px}
  .card-body{padding:14px 14px}

  /* 条件グリッド：2列 */
  .cond-grid{grid-template-columns:1fr 1fr;gap:8px}
  .cond-item label{font-size:11px;margin-bottom:4px}
  .cond-item input[type="time"],
  .cond-item input[type="date"],
  .cond-item select{font-size:16px;padding:8px 8px}
  .cond-row{font-size:13px;margin-top:10px;gap:8px}

  /* 検索 */
  .search-input{font-size:16px;padding:12px 14px}

  /* 訪問予定リスト */
  .visit-name{font-size:15px}
  .visit-cond{font-size:11px}
  .visit-item-top{gap:8px}
  .visit-item-bottom{padding-left:38px;gap:8px;margin-top:8px}
  .dur-input{width:72px;font-size:16px;padding:8px 6px}
  .del-btn,.edit-btn{width:40px;height:40px;font-size:16px;border-radius:10px}

  /* 最適化ボタン */
  .optimize-btn{padding:16px;font-size:17px;border-radius:14px}

  /* 結果 */
  .result-row{grid-template-columns:52px 26px 1fr;gap:6px;font-size:13px}
  .result-row.clinic,.result-row.lunch{padding:8px 10px}
  .r-time{font-size:12px}
  .r-name{font-size:13px}
  .r-meta{font-size:10px}
  .r-stat{font-size:11px;padding:2px 7px}
  .r-violation{font-size:10px}
  .summary-row{gap:8px;padding:10px 12px;font-size:12px}

  /* Google Mapsボタン */
  .gmap-btn{padding:16px;font-size:15px}

  /* 全inputのiOS zoom防止 */
  input[type="text"],input[type="time"],
  input[type="date"],input[type="number"],
  select,textarea{font-size:16px}
}
</style>
</head>
<body>

<!-- ログイン -->
<div id="login-screen">
  <div class="login-box">
    <h1>🚗 訪問スケジューラ</h1>
    <p>パスワードを入力してください</p>
    <input class="login-input" id="login-input" type="password" placeholder="パスワード" autocomplete="off">
    <button class="login-btn" onclick="checkLogin()">ログイン</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- ヘッダ -->
<header>
  <div class="brand">🚗 訪問スケジューラ <a href="index.html">▶ 訪問診療ナビへ</a></div>
  <div class="status"><div class="status-dot" id="status-dot"></div><span id="status-text">読込中…</span></div>
  <span id="save-status" style="font-size:11px;color:#94a3b8"></span>
</header>

<main>

  <!-- 今日の条件 -->
  <div class="card">
    <div class="card-header">今日の条件</div>
    <div class="card-body">
      <div class="cond-grid">
        <div class="cond-item">
          <label>担当医</label>
          <select id="doctor-select" onchange="onDoctorChange()" style="font-size:16px;padding:8px;border:2px solid #e2e8f0;border-radius:8px;background:#f8fafc;font-family:inherit;width:100%">
            <option value="">（選択）</option>
          </select>
        </div>
        <div class="cond-item">
          <label>訪問日</label>
          <input type="date" id="visit-date" onchange="loadRouteFromSupabase()">
        </div>
        <div class="cond-item">
          <label>最早出発</label>
          <input type="time" id="first-min" value="09:30" step="900">
        </div>
        <div class="cond-item">
          <label>最初の到着 希望</label>
          <input type="time" id="first-target" value="10:00" step="900">
        </div>
        <div class="cond-item">
          <label>クリニック帰着 希望</label>
          <input type="time" id="return-target" value="17:45" step="900">
        </div>
      </div>
      <div class="cond-row">
        <label><input type="checkbox" id="lunch-toggle" checked> ここはるで昼休憩</label>
        <input type="number" id="lunch-duration" value="60" min="30" max="120" step="15"
          style="width:66px;padding:7px 8px;font-size:14px;border:2px solid #e2e8f0;border-radius:8px;background:#f8fafc;color:#1e293b;font-family:inherit">
        <span style="font-size:13px;color:#64748b">分　<span style="font-size:11px;color:#94a3b8">（11〜14時の間で自動配置）</span></span>
      </div>
      <div class="cond-row" style="margin-top:8px">

/* ── ユーティリティ ── */
function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function normalizeQuery(q) {
  return q.toLowerCase()
    .replace(/[ァ-ヶ]/g, c => String.fromCharCode(c.charCodeAt(0) - 0x60))  // カナ→ひら
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xfee0))  // 全角→半角
    .replace(/[\s　 ・·・]+/g, '');  // 半角・全角・NBSP・中点を除去
}

function matchPatient(p, q) {
  const nq = normalizeQuery(q);
  return normalizeQuery(p.name).includes(nq) ||
         (p.furigana && normalizeQuery(p.furigana).includes(nq)) ||
         (p.external_id && String(p.external_id).includes(q.trim()));
}

function getDayName(dateStr) {
  const d = new Date(dateStr);
  return DAY_NAMES[d.getDay()];
}

/* 推奨診察時間を取得（優先順：DBのvisit_duration_min → memo_parsedのnotes → デフォルト25分） */
function extractDuration(patient) {
  // DBに直接登録された診察時間を最優先
  if (patient.visit_duration_min) return patient.visit_duration_min;
  const mp = patient.memo_parsed;
  if (!mp) return 25;
  const notes = (mp.notes || '').toString();
  const m = notes.match(/(\d{2,3})\s*分(確保|設定|必要)/);
  if (m) return parseInt(m[1]);
  return 25;
}

/* 患者の制約サマリーを 1 行に */
function condSummary(memo_parsed) {
  if (!memo_parsed) return '<span style="color:#94a3b8">制約なし</span>';
  const parts = [];
  if (memo_parsed.available === 'free') return '<span style="color:#94a3b8">終日可</span>';
  if (memo_parsed.fixed_time) parts.push(`<span class="fixed">⭐ ${memo_parsed.fixed_time}固定</span>`);
  if (memo_parsed.ng_days && memo_parsed.ng_days.length) parts.push(`<span class="ng">${memo_parsed.ng_days.join('')}不可</span>`);
  if (memo_parsed.preferred_days && memo_parsed.preferred_days.length) parts.push(`${memo_parsed.preferred_days.join('')}希望`);
  if (memo_parsed.preferred_time === 'morning') parts.push('午前希望');
  else if (memo_parsed.preferred_time === 'afternoon') parts.push('午後希望');
  else if (memo_parsed.preferred_time === 'before11') parts.push('11時まで');
  else if (memo_parsed.preferred_time === 'after14') parts.push('14時以降');
  // NG時間帯・OK時間帯も表示
  const ngw = memo_parsed.ng_windows || [];
  const okw = memo_parsed.ok_windows || [];
  if (ngw.length) {
    const uniq = [...new Set(ngw.map(w => w.day === '全' ? '全日' : w.day))].join('');
    parts.push(`<span class="ng">NG枠${ngw.length}件(${uniq})</span>`);
  }
  if (okw.length) {
    // 曜日ごとにグループ化して表示
    // 1枠のみ → 「全日09:00〜11:00のみ」
    // 複数枠  → 「全日09:00〜11:00・16:30〜可」
    const byDay = {};
    for (const w of okw) {
      const d = w.day === '全' ? '全日' : w.day;
      if (!byDay[d]) byDay[d] = [];
      const end = w.end && w.end !== '23:59' ? `〜${w.end}` : '〜';
      byDay[d].push(`${w.start}${end}`);
    }
    const totalWindows = okw.length;
    const okStrs = Object.entries(byDay).map(([d, times]) => `${d}${times.join('・')}`);
    const suffix = totalWindows === 1 ? 'のみ' : '可';
    parts.push(`${okStrs.join('、')}${suffix}`);
  }
  if (memo_parsed.week_pattern) parts.push(memo_parsed.week_pattern);
  if (memo_parsed.needs_review) parts.push('<span class="ng">⚠️要確認</span>');
  return parts.length ? parts.join(' / ') : '<span style="color:#94a3b8">制約なし</span>';
}

        input.focus();
        if (p) addPatientToToday(p);
        input.value = '';
        sug.style.display = 'none';
        selecting = false;
      });
    });
    sug.style.display = 'block';
  });

  input.addEventListener('keydown', e => {
    const items = sug.querySelectorAll('.suggest-item');
    if (e.key === 'ArrowDown') { e.preventDefault(); idx = Math.min(idx + 1, items.length - 1); items.forEach((el, i) => el.classList.toggle('active', i === idx)); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); idx = Math.max(idx - 1, 0); items.forEach((el, i) => el.classList.toggle('active', i === idx)); }
    else if (e.key === 'Enter' && idx >= 0) { e.preventDefault(); items[idx]?.click(); }
    else if (e.key === 'Escape') sug.style.display = 'none';
  });

  input.addEventListener('blur', () => {
    setTimeout(() => { if (!selecting) sug.style.display = 'none'; }, 300);
  });


}

/* ── 時刻ユーティリティ ── */
function timeToMin(hhmm) {
  const [h, m] = hhmm.split(':').map(Number);
  return h * 60 + m;
}
function minToTime(min) {
  const h = Math.floor(min / 60);
  const m = min % 60;
  return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
}
function roundUp15(min) {
  return Math.ceil(min / 15) * 15;
}

/* 患者の指定日における利用可能時間帯（OK windows） */
function patientFeasibleWindows(patient, dayName, todayOverride) {
  // 今日だけの制約が入っていたら通常制約を全て無視してそれだけを使う
  if (todayOverride?.from && todayOverride?.to) {
    return [[timeToMin(todayOverride.from), timeToMin(todayOverride.to)]];
  }

  const mp = patient.memo_parsed || {};
  // 全日 NG
  if (mp.ng_days && mp.ng_days.includes(dayName)) return [];

  // 出発 9:00 〜 18:30 をフルウィンドウとする
  let windows = [[9 * 60, 18 * 60 + 30]];

  // NG windows を引く
  const ngs = (mp.ng_windows || []).filter(w => w.day === dayName || w.day === '全');
  for (const ng of ngs) {
    const s = timeToMin(ng.start);
    const e = timeToMin(ng.end);
    windows = subtractWindow(windows, s, e);
  }

  // OK windows がある場合は積集合
  const oks = (mp.ok_windows || []).filter(w => w.day === dayName || w.day === '全');
  if (oks.length) {
    let intersection = [];
    for (const ok of oks) {
      const os = timeToMin(ok.start);
      const oe = timeToMin(ok.end);
      for (const [ws, we] of windows) {
        const is = Math.max(ws, os);
        const ie = Math.min(we, oe);
        if (is < ie) intersection.push([is, ie]);
      }
    }
    windows = intersection;
  }

  // 時刻順にソート（登録順によらず早い枠から試せるようにする）
  windows.sort((a, b) => a[0] - b[0]);

  // fixed_time があればその点だけ
  if (mp.fixed_time) {
    const ft = timeToMin(mp.fixed_time);
    return [[ft, ft + 1]];  // ピンポイント
  }

  return windows;
}

function subtractWindow(windows, s, e) {
  const out = [];
  for (const [ws, we] of windows) {
    if (e <= ws || s >= we) { out.push([ws, we]); continue; }
    if (s > ws) out.push([ws, s]);
    if (e < we) out.push([e, we]);
  }
  return out;
}

/* ── Google Maps JS SDK のロード待ち（最適化ボタン押下時に初めて読み込む） ── */
function waitForGMaps(timeout = 15000) {
  return new Promise((resolve, reject) => {
    if (window._gMapsLoaded) { resolve(); return; }
    // まだ script タグがなければ注入
    if (!document.getElementById('gmaps-script')) {
      const s = document.createElement('script');
      s.id = 'gmaps-script';
      s.src = 'https://maps.googleapis.com/maps/api/js?key=AIzaSyCOwmnhLf7L6l-T6M606v635iXDMTcdqv8&callback=_gMapsCallback&loading=async';
      s.async = true;
      document.head.appendChild(s);
    }
    const start = Date.now();
    const check = () => {
      if (window._gMapsLoaded) { resolve(); return; }
      if (Date.now() - start > timeout) { reject(new Error('Google Maps の読込がタイムアウトしました')); return; }
      setTimeout(check, 150);
    };
    check();
  });
}

/* ── Google Maps API 使用量管理（Supabase 永続化） ── */
const MAPS_FREE_LIMIT = 40000; // $200クレジット ÷ $5/1000要素 = 40,000要素/月
let mapsUsedCache = 0; // in-memory キャッシュ（同期読み取り用）

function mapsUsageKey() {
  const d = new Date();
  return `maps_usage_${d.getFullYear()}_${String(d.getMonth()+1).padStart(2,'0')}`;
}
function getMapsUsed() {
  return mapsUsedCache;
}
async function loadMapsUsage() {
  // Supabase から今月の使用量を読み込む
  try {
    const key = mapsUsageKey();
    const { data, error } = await db.from('app_settings').select('value').eq('key', key).maybeSingle();
    if (!error && data?.value != null) {
      mapsUsedCache = parseInt(data.value) || 0;
    } else {
      // Supabase に記録なし → localStorage の値があれば移行
      const local = parseInt(localStorage.getItem(key) || '0');
      if (local > 0) {
        mapsUsedCache = local;
        await saveMapsUsageToSupabase(local); // 移行
      } else {
        mapsUsedCache = 0;
      }
    }
  } catch(e) {
    // Supabase 失敗時は localStorage フォールバック
    mapsUsedCache = parseInt(localStorage.getItem(mapsUsageKey()) || '0');
  }
  updateMapsUsageDisplay();
}
async function saveMapsUsageToSupabase(n) {
  try {
    await db.from('app_settings').upsert(
      { key: mapsUsageKey(), value: n, updated_at: new Date().toISOString() },
      { onConflict: 'key' }
    );
  } catch(e) { console.warn('Maps使用量保存失敗:', e.message); }
}
async function addMapsUsed(n) {
  mapsUsedCache += n;
  localStorage.setItem(mapsUsageKey(), String(mapsUsedCache)); // バックアップ
  await saveMapsUsageToSupabase(mapsUsedCache);
}
function getMapsRemaining() {
  return Math.max(0, MAPS_FREE_LIMIT - getMapsUsed());
}
/* ── 距離行列取得（JS SDK の DistanceMatrixService を使用） ── */
async function fetchDistanceMatrix(locations) {
  // locations: [{address, lat?, lng?}, ...]  クリニックが index 0
  try {
    await waitForGMaps();
  } catch (e) {
    console.warn('Google Maps SDK 未ロード → フォールバック使用', e.message);
    return fallbackDistanceMatrix(locations);
  }

  // 無料枠チェック（40,000要素/月）
  const elements = locations.length * locations.length;
  if (getMapsUsed() + elements > MAPS_FREE_LIMIT) {
    const used = getMapsUsed();
    const remaining = getMapsRemaining();
    throw new Error(
      `Google Maps の無料枠上限に達したため実行できません。\n` +
      `今月使用済み: ${used.toLocaleString()} 要素 / 残り: ${remaining.toLocaleString()} 要素\n` +
      `（今回必要: ${elements} 要素）`
    );
  }

  // DistanceMatrixService はアドレス文字列を直接受け付ける（内部でジオコード）
  const addresses = locations.map(l => l.address);
  const service = new google.maps.DistanceMatrixService();

  try {
    const response = await new Promise((resolve, reject) => {
      const avoidTolls = document.getElementById('avoid-tolls')?.checked ?? true;
      service.getDistanceMatrix({
        origins: addresses,
        destinations: addresses,
        travelMode: google.maps.TravelMode.DRIVING,
        unitSystem: google.maps.UnitSystem.METRIC,
        language: 'ja',
        avoidTolls: avoidTolls,
      }, (resp, status) => {
        if (status === google.maps.DistanceMatrixStatus.OK) {
          resolve(resp);
        } else {
          reject(new Error('DistanceMatrixService error: ' + status));
        }
      });
    });

    const n = locations.length;
    const matrix = [];
    for (let i = 0; i < n; i++) {
      matrix[i] = [];
      for (let j = 0; j < n; j++) {
        if (i === j) { matrix[i][j] = 0; continue; }
        const el = response.rows[i].elements[j];
        if (el.status === 'OK' && el.duration) {
          matrix[i][j] = Math.ceil(el.duration.value / 60);  // 秒 → 分（切り上げ）
        } else {
          console.warn(`距離取得失敗 [${i}→${j}]`, el.status, addresses[i], '→', addresses[j]);
          matrix[i][j] = 15;  // 取得失敗分のみ 15 分デフォルト
        }
      }
    }
    await addMapsUsed(elements);
    updateMapsUsageDisplay();
    return matrix;

  } catch (e) {
    console.error('DistanceMatrixService 例外:', e);
    return fallbackDistanceMatrix(locations);
  }
}

function fallbackDistanceMatrix(locations) {
  // 直線距離（km）× 2 を分換算（市街地での補正）
  const n = locations.length;
  const matrix = [];
  for (let i = 0; i < n; i++) {
    matrix[i] = [];
    for (let j = 0; j < n; j++) {
      if (i === j) { matrix[i][j] = 0; continue; }
      const a = locations[i], b = locations[j];
      if (a.lat && a.lng && b.lat && b.lng) {
        const km = haversine(a.lat, a.lng, b.lat, b.lng);
        matrix[i][j] = Math.max(5, Math.ceil(km * 2.5));  // 1km あたり 2.5 分
      } else {
        matrix[i][j] = 15;  // 不明時のデフォルト
      }
    }
  }
  return matrix;
}

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) ** 2 +
    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLng / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

    const feasWins = todayList.map(t =>
      patientFeasibleWindows(t.patient, dayName, overrides[t.patient.external_id])
    );

    // 各患者に「fixed」「優先」スコア（今日だけ制約がある場合は fixed 扱いを解除）
    const annotations = todayList.map((t, i) => {

      return { isFixed, fixedTime, prefDays: mp.preferred_days || [], prefTime: mp.preferred_time };
    });

    // 訪問順序を決める：固定時刻患者を先に確保、その他を貪欲+局所探索
    const result = solveSchedule(matrix, todayList, feasWins, annotations, {

  }
}

/* ── スケジューラ本体 ── */
function solveSchedule(matrix, items, feasWins, annotations, cfg) {
  const N = items.length;

  if (N <= 7) {
    // 全順列を試す（N! ≦ 5040）→ 最適解が保証される
    const allOrders = permutations([...Array(N).keys()]);
    const candidates = allOrders.map(ord =>
      simulateSchedule(ord, matrix, items, feasWins, annotations, cfg));
    candidates.sort(scheduleCmp);
    return candidates[0];
  }

  // N > 7: 制約優先挿入法（人間の発想に近いアルゴリズム）
  //   「固定時刻の患者 → 時間帯が狭い患者 → 自由な患者」の順に、
  //    既存スケジュールの中で最もスコアが良い位置に1人ずつ挿入していく
  const candidates = [];

  // メイン：制約優先挿入
  const mainOrder = constraintFirstInsert(matrix, items, feasWins, annotations, cfg, false);
  candidates.push(simulateSchedule(mainOrder, matrix, items, feasWins, annotations, cfg));

  // スワップ局所改善（全ペアのスワップを繰り返して深化）
  candidates.push(swapImprove(mainOrder, matrix, items, feasWins, annotations, cfg));

  // フリー患者をランダムに並べた多様性バリアント（制約固定患者の位置は変えない）
  for (let i = 0; i < 15; i++) {
    const rndOrder = constraintFirstInsert(matrix, items, feasWins, annotations, cfg, true);
    candidates.push(simulateSchedule(rndOrder, matrix, items, feasWins, annotations, cfg));
  }

  // フォールバック：クリニックからの距離貪欲
  const distOrder = sortIndicesByDistance(matrix, N);
  candidates.push(simulateSchedule(distOrder, matrix, items, feasWins, annotations, cfg));

  candidates.sort(scheduleCmp);
  return candidates[0];
}

/* 制約優先挿入
 * ① 固定時刻患者（時刻順）→ ② 時間帯が狭い患者（午前縛り等、早い枠から）
 * → ③ 自由な患者（shuffleFree=true でランダム）
 * 各患者を既存スケジュールの全挿入位置から最良を選んで追加 */
function constraintFirstInsert(matrix, items, feasWins, annotations, cfg, shuffleFree) {
  const N = items.length;
  const fixedList = [];
  const constrainedList = [];
  const freeList = [];

  for (let i = 0; i < N; i++) {
    const ann = annotations[i];
    const totalFeasible = feasWins[i].reduce((s, [ws, we]) => s + we - ws, 0);
    if (ann.isFixed) {
      fixedList.push(i);
    } else if (totalFeasible < 4 * 60) {
      // 利用可能時間帯が 4 時間未満 → 制約が厳しいグループ
      constrainedList.push(i);
    } else {
      freeList.push(i);
    }
  }

  // 固定：固定時刻の早い順（アンカーとして最初に確保）
  fixedList.sort((a, b) => annotations[a].fixedTime - annotations[b].fixedTime);

  // 制約あり：最早ウィンドウ開始が早い順（午前縛りの人を先に枠取り）
  constrainedList.sort((a, b) => {
    const aStart = feasWins[a].length ? feasWins[a][0][0] : 18 * 60;
    const bStart = feasWins[b].length ? feasWins[b][0][0] : 18 * 60;
    return aStart - bStart;
  });

  // フリー：多様性のためにシャッフル可
  if (shuffleFree) shuffleArr(freeList);

  // 挿入順: 固定 → 制約あり → フリー
  const insertOrder = [...fixedList, ...constrainedList, ...freeList];

  // 1人ずつ最良位置に挿入
  let order = [];
  for (const idx of insertOrder) {
    order = insertBestPos(idx, order, matrix, items, feasWins, annotations, cfg);
  }
  return order;
}

/* idx を currentOrder の全挿入位置から最スコア位置に挿入して返す */
function insertBestPos(newIdx, currentOrder, matrix, items, feasWins, annotations, cfg) {
  if (currentOrder.length === 0) return [newIdx];
  let bestScore = Infinity;
  let bestOrder = null;
  for (let pos = 0; pos <= currentOrder.length; pos++) {
    const testOrder = [
      ...currentOrder.slice(0, pos),
      newIdx,
      ...currentOrder.slice(pos)
    ];
    const result = simulateSchedule(testOrder, matrix, items, feasWins, annotations, cfg);
    const score = schedScore(result);
    if (score < bestScore) { bestScore = score; bestOrder = testOrder; }
  }
  return bestOrder;
}

/* スワップ局所改善：全ペアのスワップで改善がある限り繰り返す */
function swapImprove(initOrder, matrix, items, feasWins, annotations, cfg) {
  let best = simulateSchedule(initOrder, matrix, items, feasWins, annotations, cfg);
  let improved = true;
  while (improved) {
    improved = false;
    const ord = best.order;
    for (let i = 0; i < ord.length - 1; i++) {
      for (let j = i + 1; j < ord.length; j++) {
        const newOrd = [...ord];
        [newOrd[i], newOrd[j]] = [newOrd[j], newOrd[i]];
        const cand = simulateSchedule(newOrd, matrix, items, feasWins, annotations, cfg);
        if (schedScore(cand) < schedScore(best)) { best = cand; improved = true; }
      }
    }
  }
  return best;
}

/* スコア計算（小さいほど良い）
 *  ① 制約違反 >> ② 帰着遅れ >> ③ 出発遅れ >> ④ 走行時間 */
function schedScore(r) {
  return r.infeasibleCount * 100000
       + r.lateMin        * 1000
       + r.startDelay     * 10
       + r.totalTravel;
}

/* 候補ソート用比較関数 */
function scheduleCmp(a, b) {
  if (a.infeasibleCount !== b.infeasibleCount) return a.infeasibleCount - b.infeasibleCount;
  if (a.lateMin !== b.lateMin) return a.lateMin - b.lateMin;
  const devA = a.startDelay * 2 + a.startEarly * 0.5;
  const devB = b.startDelay * 2 + b.startEarly * 0.5;
  if (Math.abs(devA - devB) > 5) return devA - devB;
  if (a.cfg.lunchEnabled) {
    if (a.lunchTaken !== b.lunchTaken) return a.lunchTaken ? -1 : 1;
  }
  return a.totalTravel - b.totalTravel;
}

function sortIndicesByDistance(matrix, N) {
  const idx = [...Array(N).keys()];
  idx.sort((a, b) => matrix[0][a + 1] - matrix[0][b + 1]);
  return idx;
}

function permutations(arr) {
  if (arr.length <= 1) return [arr];
  const out = [];
  for (let i = 0; i < arr.length; i++) {
    const rest = [...arr.slice(0, i), ...arr.slice(i + 1)];
    for (const p of permutations(rest)) {
      out.push([arr[i], ...p]);
    }
  }
  return out;
}

function shuffleArr(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/* ── シミュレーション本体（昼休憩を lunchAt 番目の患者の直前に挿入、-1 なら挿入しない） ── */
function runSimulation(order, lunchAt, matrix, items, feasWins, annotations, cfg) {
  const N = order.length;
  const visits = [];
  let currentTime = 9 * 60;  // ハード下限 9:00（cfg.firstMin は「出発目安」としてペナルティに使用）
  let infeasibleCount = 0;
  let lateMin = 0;
  let lunchTaken = false;
  let lunchStart = null;
  let totalTravel = 0;
  let prevMatIdx = 0;

  for (let step = 0; step < N; step++) {
    // 昼休憩の挿入（step === lunchAt かつ最初の患者ではない）
    if (lunchAt > 0 && step === lunchAt) {
      const travelToClinic = matrix[prevMatIdx][0];
      const clinicArrival = currentTime + travelToClinic;
      const lunchEnd = clinicArrival + cfg.lunchDuration;
      visits.push({ type: 'lunch', start: clinicArrival, end: lunchEnd });
      lunchTaken = true;
      lunchStart = clinicArrival;
      totalTravel += travelToClinic;
      currentTime = lunchEnd;
      prevMatIdx = 0;  // クリニックに戻った
    }

    const pIdx = order[step];
    const matIdx = pIdx + 1;
    const travelUsed = matrix[prevMatIdx][matIdx];
    let earliest = currentTime + travelUsed;
    if (step === 0) earliest = Math.max(earliest, cfg.firstMin);
    earliest = roundUp15(earliest);

    const windows = feasWins[pIdx];
    const ann = annotations[pIdx];
    let arrival = -1;

    if (ann.isFixed) {
      arrival = ann.fixedTime;
      if (ann.fixedTime < earliest) infeasibleCount++;
    } else {
      for (const [ws, we] of windows) {
        const slot = Math.max(earliest, roundUp15(ws));
        if (slot < we) { arrival = slot; break; }
      }
      if (arrival < 0) { infeasibleCount++; arrival = earliest; }
    }

    const dur = items[pIdx].duration;
    const departure = arrival + dur;
    totalTravel += travelUsed;

    visits.push({
      type: 'patient', idx: pIdx,
      patient: items[pIdx].patient,
      duration: dur, arrival, departure, travel: travelUsed,
      warning: !ann.isFixed && !inAnyWindow(arrival, windows) ? '時間制約外'
             : (ann.isFixed && ann.fixedTime < earliest ? '固定時刻に到達不能' : null)
    });

    currentTime = departure;
    prevMatIdx = matIdx;
  }

  const returnTravel = cfg.returnClinic ? matrix[prevMatIdx][0] : 0;
  const returnTime = currentTime + returnTravel;
  if (returnTime > cfg.returnTarget) lateMin = returnTime - cfg.returnTarget;
  totalTravel += returnTravel;

  const firstPatient = visits.find(v => v.type === 'patient');
  const firstArrival = firstPatient ? firstPatient.arrival : cfg.firstMin;
  const firstDepart = firstPatient ? firstArrival - firstPatient.travel : cfg.firstMin;
  const startDelay = Math.max(0, firstArrival - cfg.firstTarget);   // 10:00着より遅れた分
  // 出発が cfg.firstMin（9:30目安）より早い場合も startEarly に加算（患者が多ければ優先度低い）
  const startEarly = Math.max(0, cfg.firstTarget - firstArrival)
                   + Math.max(0, cfg.firstMin - firstDepart) * 0.5;

  return {
    order, visits, returnTime, infeasibleCount, lateMin,
    totalTravel, firstArrival, startDelay, startEarly,
    cfg, returnTravel, lunchTaken, lunchStart
  };
}

/* 昼休憩の時刻品質スコア（小さいほど良い / Infinity = 受け入れ不可）
   受け入れ可能帯: 11:00〜14:00 クリニック着
   理想帯: 11:30〜13:00 クリニック着（中心 12:15 目標）               */
function lunchTimingScore(lunchStart, lunchDuration) {
  if (lunchStart === null) return Infinity;
  const ACCEPT_MIN = 11 * 60;       // 11:00 未満はNG
  const ACCEPT_MAX = 14 * 60;       // 14:00 超はNG
  if (lunchStart < ACCEPT_MIN || lunchStart > ACCEPT_MAX) return Infinity;
  const mid = lunchStart + lunchDuration / 2;
  const ideal = 12 * 60 + 15;      // 12:15 中心が理想
  return Math.abs(mid - ideal);
}

/* 順列ごとに全挿入位置を試して最適な昼休憩位置を選ぶ */
function simulateSchedule(order, matrix, items, feasWins, annotations, cfg) {
  if (!cfg.lunchEnabled) {
    return runSimulation(order, -1, matrix, items, feasWins, annotations, cfg);
  }

  const N = order.length;
  let bestResult = null;
  let bestScore = Infinity;

  // 挿入位置 1〜N を全て試す（0 = 最初の患者の前 = 診療前に休憩 → 除外）
  for (let lunchAt = 1; lunchAt <= N; lunchAt++) {
    const res = runSimulation(order, lunchAt, matrix, items, feasWins, annotations, cfg);
    const tScore = lunchTimingScore(res.lunchStart, cfg.lunchDuration);
    if (tScore === Infinity) continue;  // 11〜14時の範囲外 → スキップ

    // 複合スコア：制約違反 >> 帰着遅れ >> 総移動時間 >> 昼のタイミング（軽微）
    const score = res.infeasibleCount * 100000 + res.lateMin * 1000 + res.totalTravel + tScore * 0.1;
    if (score < bestScore) { bestScore = score; bestResult = res; }
  }

  // 11〜14時に挿入できる位置が見つからなければ昼休憩なしで返す
  if (!bestResult) {
    const noLunch = runSimulation(order, -1, matrix, items, feasWins, annotations, cfg);
    noLunch.lunchTaken = false;
    return noLunch;
  }
  return bestResult;
}

function inAnyWindow(t, windows) {
  return windows.some(([s, e]) => t >= s && t < e);
}

/* OK枠とNG枠の矛盾を検出して説明文リストを返す */
function detectWindowConflicts(mp) {
  const toMin = s => { const [h,m]=(s||'00:00').split(':').map(Number); return h*60+m; };
  const ok = mp.ok_windows || [];
  const ng = mp.ng_windows || [];
  const msgs = [];

  for (const okw of ok) {
    const os = toMin(okw.start);
    const oe = toMin(okw.end === '23:59' ? '23:59' : (okw.end || '23:59'));
    const killers = ng.filter(ngw => {
      // 曜日が合致するか
      const dayMatch = ngw.day === okw.day || ngw.day === '全' || okw.day === '全';
      if (!dayMatch) return false;
      // OK枠がNG枠に完全に含まれるか
      return toMin(ngw.start) <= os && toMin(ngw.end) >= oe;
    });
    if (killers.length) {
      const dayLabel = okw.day === '全' ? '全日' : `${okw.day}曜`;
      const ngDesc = killers.map(n => `${n.day === '全' ? '全日' : n.day+'曜'}${n.start}〜${n.end}${n.reason ? `（${n.reason}）` : ''}`).join('、');
      msgs.push(`${dayLabel}${okw.start}〜${okw.end} のOK枠が、NG枠「${ngDesc}」に完全に含まれています`);
    }
  }

  // OK枠があるのに実質0分になる曜日も検出
  const days = ['月','火','水','木','金','土','日','全'];
  for (const d of days) {
    const okForDay = ok.filter(w => w.day === d || w.day === '全');
    if (!okForDay.length) continue;
    // その曜日の実効ウィンドウを計算
    const wins = detectWindowConflicts._calcWins ? detectWindowConflicts._calcWins(d, ok, ng) : null;
    // 簡易チェック：全OK枠がNGで消えているか
    const allKilled = okForDay.every(okw => {
      const os = toMin(okw.start), oe = toMin(okw.end === '23:59' ? '23:59' : (okw.end||'23:59'));
      return ng.some(ngw => {
        const dm = ngw.day === d || ngw.day === '全' || d === '全';
        return dm && toMin(ngw.start) <= os && toMin(ngw.end) >= oe;
      });
    });
    if (allKilled && !msgs.some(m => m.includes(`${d === '全' ? '全日' : d+'曜'}`))) {
      const dLabel = d === '全' ? '全日' : `${d}曜`;
      msgs.push(`${dLabel}はOK枠が全てNG枠と重なっており、訪問可能な時間帯がありません`);
    }
  }

  return [...new Set(msgs)]; // 重複除去
}

function closeEditor() {
  document.getElementById('editor-overlay').style.display = 'none';
  editorPatient = null;
}

function addWinRow(listId) {

  const tmp = document.createElement('div');
  tmp.innerHTML = `<div class="window-row">
    <select class="wr-day">${[...WEEK_DAYS,'全'].map(d=>`<option>${d}</option>`).join('')}</select>
    <input class="wr-time" type="time" value="09:00">

    <button class="win-del" onclick="this.closest('.window-row').remove()">✕</button>
  </div>`;

function collectChecks(field) {
  return Array.from(document.querySelectorAll(`input[data-field="${field}"]:checked`))
    .map(cb => cb.value);
}

function collectWins(listId) {
  return Array.from(document.querySelectorAll(`#${listId} .window-row`)).map(row => {
    const [dayEl] = row.querySelectorAll('.wr-day');
    const times = row.querySelectorAll('.wr-time');
    const reasonEl = row.querySelector('.wr-reason');
    const obj = { day: dayEl.value, start: times[0].value, end: times[1].value };
    const r = reasonEl.value.trim();
    if (r) obj.reason = r;
    return obj;
  }).filter(w => w.start && w.end);
}

async function saveEditor() {
  if (!editorPatient) return;
  const btn = document.getElementById('ed-save-btn');
  btn.disabled = true; btn.textContent = '保存中…';
  try {
    const fixedTime = document.getElementById('ef-fixed-time').value || null;
    const newParsed = {
      available:      document.getElementById('ef-available').value,
      ng_days:        collectChecks('ng_days'),
      preferred_days: collectChecks('pref_days'),
      preferred_time: document.getElementById('ef-pref-time').value,
      fixed_time:     fixedTime,
      week_pattern:   document.getElementById('ef-week-pattern').value.trim() || null,
      ng_windows:     collectWins('ng-list').sort((a,b) => a.start.localeCompare(b.start)),
      ok_windows:     collectWins('ok-list').sort((a,b) => a.start.localeCompare(b.start)),
      notes:          document.getElementById('ef-notes').value.trim(),
      needs_review:   document.getElementById('ef-needs-review').checked || undefined
    };
    if (!newParsed.needs_review) delete newParsed.needs_review;

    const { error } = await db.from('scheduler_patients')
      .update({ memo_parsed: newParsed })
      .eq('external_id', editorPatient.external_id);
    if (error) throw error;

    // ローカルキャッシュを更新
    const idx = patients.findIndex(p => p.external_id === editorPatient.external_id);
    if (idx >= 0) patients[idx].memo_parsed = newParsed;
    editorPatient.memo_parsed = newParsed;
    renderTodayList();
    closeEditor();

    // 結果カードが表示中なら「再計算してください」バナーを出す
    const rc = document.getElementById('result-card');
    if (rc.style.display !== 'none') {
      const existing = document.getElementById('recalc-banner');
      if (!existing) {
        const banner = document.createElement('div');
        banner.id = 'recalc-banner';
        banner.style.cssText = 'background:#fef3c7;border-left:4px solid #f59e0b;padding:10px 16px;font-size:13px;color:#92400e;display:flex;align-items:center;gap:10px';
        banner.innerHTML = '⚠️ 制約を変更しました。結果が古い可能性があります。&nbsp;<button onclick="document.getElementById(\'recalc-banner\').remove();optimize()" style="background:#f59e0b;color:white;border:none;border-radius:6px;padding:4px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">再計算する</button><button onclick="document.getElementById(\'recalc-banner\').remove()" style="background:none;border:none;color:#92400e;cursor:pointer;font-size:16px;margin-left:auto">✕</button>';
        rc.insertAdjacentElement('afterbegin', banner);
      }
    }

    showToast('✅ 保存しました');
  } catch (e) {
    alert('保存に失敗しました: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = '保存';
  }
}

function showToast(msg) {
  const t = document.getElementById('toast-msg');
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._tid);
  t._tid = setTimeout(() => { t.style.opacity = '0'; }, 2500);
}

/* ── 制約違反の詳細メッセージを生成 ── */
function violationDetails(patient, arrival, dayName, hasWarning) {
  const mp = patient.memo_parsed || {};
  const msgs = [];

  // ── ハード制約（時間帯NG / 固定時刻） ──
  if (hasWarning) {
    if (mp.fixed_time) {
      msgs.push({ level: 'ng', text: `固定時刻 ${mp.fixed_time} に到達不能（実際の到着: ${minToTime(arrival)}）` });
    } else {
      // NG枠に入っているか
      const ngViolated = (mp.ng_windows || []).filter(w =>
        (w.day === dayName || w.day === '全') &&
        arrival >= timeToMin(w.start) && arrival < timeToMin(w.end)
      );
      for (const ng of ngViolated) {
        msgs.push({ level: 'ng', text: `NG時間帯（${ng.start}〜${ng.end}）に訪問になっています` });
      }
      // OK枠があるのに外れているか
      const oks = (mp.ok_windows || []).filter(w => w.day === dayName || w.day === '全');
      if (oks.length > 0) {
        const inOk = oks.some(ok => arrival >= timeToMin(ok.start) && arrival < timeToMin(ok.end));
        if (!inOk) {
          const okStr = oks.map(o => `${o.start}〜${o.end}`).join('、');
          msgs.push({ level: 'ng', text: `指定可能時間（${okStr}）外の訪問になっています` });
        }
      }
      // ウィンドウが空（その日全てNG）
      if (!ngViolated.length && !oks.length) {
        msgs.push({ level: 'ng', text: '時間制約を満たせる枠がありませんでした' });
      }
    }
  }

  // ── ソフト制約（希望時間帯） ──
  if (mp.preferred_time === 'morning' && arrival >= 12 * 60) {
    msgs.push({ level: 'warn', text: `午前希望ですが ${minToTime(arrival)} の訪問になっています` });
  } else if (mp.preferred_time === 'afternoon' && arrival < 12 * 60) {
    msgs.push({ level: 'warn', text: `午後希望ですが ${minToTime(arrival)} の訪問になっています` });
  } else if (mp.preferred_time === 'before11' && arrival >= 11 * 60) {
    msgs.push({ level: 'warn', text: `11時までの希望ですが ${minToTime(arrival)} の訪問になっています` });
  } else if (mp.preferred_time === 'after14' && arrival < 14 * 60) {
    msgs.push({ level: 'warn', text: `14時以降の希望ですが ${minToTime(arrival)} の訪問になっています` });
  }

  // ── ソフト制約（希望曜日） ──
  if (mp.preferred_days && mp.preferred_days.length > 0 && !mp.preferred_days.includes(dayName)) {
    msgs.push({ level: 'warn', text: `${mp.preferred_days.join('・')}曜希望ですが ${dayName}曜の訪問になっています` });
  }

  return msgs;
}

/* ── 結果描画 ── */
function renderResult(result, locations, dateStr, dayName, overrides = {}) {
  const card = document.getElementById('result-card');
  const body = document.getElementById('result-body');

  // ヘッダーに曜日・日付を表示
  const dateLabel = (() => {
    if (!dateStr) return '最適化結果';
    const d = new Date(dateStr);
    const m = d.getMonth() + 1, day = d.getDate();
    const dow = ['日','月','火','水','木','金','土'][d.getDay()];
    return `最適化結果 — ${m}月${day}日（${dow}）`;
  })();
  card.querySelector('.card-header').textContent = dateLabel;

  const rows = [];
  const cfg = result.cfg;

  // クリニック発（最初の患者の travel から逆算）
  const firstVisit = result.visits.find(v => v.type === 'patient');
  if (firstVisit) {
    const depart = firstVisit.arrival - firstVisit.travel;
    rows.push(`<div class="result-row clinic">
      <div class="r-time">${minToTime(depart)}</div>
      <div class="r-num clinic">🏥</div>
      <div class="r-info"><div class="r-name">ここはる発</div></div>
    </div>`);
  }

  let pNum = 0;
  for (const v of result.visits) {
    if (v.type === 'lunch') {
      rows.push(`<div class="result-row lunch">
        <div class="r-time">${minToTime(v.start)}</div>
        <div class="r-num lunch">🍱</div>
        <div class="r-info"><div class="r-name">ここはるで昼休憩 (〜${minToTime(v.end)})</div></div>
      </div>`);
    } else if (v.type === 'patient') {
      pNum++;
      const ov = overrides[v.patient.external_id];
      const condText = ov
        ? `<span style="color:#b45309;font-weight:700">🕐 今日: ${ov.from}〜${ov.to}</span><span style="color:#94a3b8;font-size:10px;margin-left:4px">（通常制約を無視）</span>`
        : condSummary(v.patient.memo_parsed);
      const violations = ov ? [] : violationDetails(v.patient, v.arrival, dayName, !!v.warning);
      const hasNG   = violations.some(m => m.level === 'ng');
      const hasWarn = violations.some(m => m.level === 'warn');
      const badgeIcon = hasNG ? '❌' : hasWarn ? '⚠️' : '';
      const rowClass = hasNG ? 'result-row row-ng' : hasWarn ? 'result-row row-warn' : 'result-row';
      const detailHtml = violations.map(m =>
        `<div class="r-violation ${m.level === 'ng' ? 'r-viol-ng' : 'r-viol-warn'}">${m.level === 'ng' ? '❌' : '⚠️'} ${esc(m.text)}</div>`
      ).join('');
      rows.push(`<div class="${rowClass}">
        <div class="r-time">${minToTime(v.arrival)}</div>
        <div class="r-num">${pNum}</div>
        <div class="r-info">
          <div class="r-name">${esc(v.patient.name)}${badgeIcon ? ` <span class="r-warn">${badgeIcon}</span>` : ''}</div>
          <div class="r-meta">${condText}</div>
          <div class="r-stats">
            <span class="r-stat travel">🚗 ${v.travel}分</span>
            <span class="r-stat consult">📋 ${v.duration}分</span>
          </div>
          ${detailHtml}
          <button class="r-cancel-btn" onclick="cancelPatientFromResult('${esc(v.patient.external_id)}')">✕ キャンセル</button>
        </div>
      </div>`);
    }
  }

  if (cfg.returnClinic && result.returnTravel > 0) {
    rows.push(`<div class="result-row clinic">
      <div class="r-time">${minToTime(result.returnTime)}</div>
      <div class="r-num clinic">🏥</div>
      <div class="r-info"><div class="r-name">ここはる着</div></div>
    </div>`);
  }

  // サマリ
  const totalTravel = result.totalTravel || 0;
  const totalConsult = result.visits.filter(v => v.type === 'patient').reduce((s, v) => s + v.duration, 0);

  const now = new Date();
  const ts = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  const summary = `<div class="summary-row">
    <div>📍 訪問 ${pNum}人</div>
    <div>🚗 走行 ${totalTravel}分</div>
    <div>🩺 診察 ${totalConsult}分</div>
    <div>⏱ 総時間 ${minToTime(result.returnTime - (firstVisit.arrival - firstVisit.travel))}</div>
    <div style="margin-left:auto;font-weight:500;color:#64748b;font-size:11px">🕐 ${ts} 計算</div>
  </div>`;

  // 警告（各行の詳細は行内に表示済み。サマリはカウントのみ）
  let warnings = '';
  const ngCount  = result.visits.filter(v => v.type === 'patient' && violationDetails(v.patient, v.arrival, dayName, !!v.warning).some(m => m.level === 'ng')).length;
  const warnCount = result.visits.filter(v => v.type === 'patient' && !violationDetails(v.patient, v.arrival, dayName, !!v.warning).some(m => m.level === 'ng') && violationDetails(v.patient, v.arrival, dayName, !!v.warning).some(m => m.level === 'warn')).length;
  if (ngCount > 0) {
    warnings += `<div class="warning-box" style="border-color:#c53030;background:#fff5f5;color:#c53030">❌ ${ngCount}人の時間制約（NG枠・固定時刻）が満たせていません。各行の詳細を確認してください。</div>`;
  }
  if (warnCount > 0) {
    warnings += `<div class="warning-box">⚠️ ${warnCount}人の希望（時間帯・曜日）が完全には反映できていません。</div>`;
  }
  if (result.lateMin > 0) {
    warnings += `<div class="warning-box">⚠️ 帰着が ${result.lateMin} 分遅れる予定です（${minToTime(result.returnTime)}）。</div>`;
  }
  if (cfg.lunchEnabled && !result.lunchTaken) {
    warnings += `<div class="warning-box">⚠️ 11〜14時の間にここはるへ戻れるタイミングがないため、昼休憩を自動挿入できませんでした。スケジュールを確認のうえ手動で調整してください。</div>`;
  }

  body.innerHTML = rows.join('') + summary + warnings;

  // Google Maps URL
  const orderedPatients = result.visits.filter(v => v.type === 'patient').map(v => v.patient);
  const fullList = [CLINIC, ...orderedPatients];
  if (cfg.returnClinic) fullList.push(CLINIC);
  if (fullList.length >= 2) {
    const origin = encodeURIComponent(fullList[0].address);
    const destination = encodeURIComponent(fullList[fullList.length - 1].address);
    const waypoints = fullList.slice(1, -1).map(p => encodeURIComponent(p.address)).join('|');
    let url = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}&travelmode=driving`;
    if (waypoints) url += `&waypoints=${waypoints}`;
    document.getElementById('gmap-btn').href = url;
  }

  card.style.display = 'block';
  // フェードインアニメーション（クラス付け直しで再トリガー）
  void card.offsetWidth; // reflow
  card.classList.add('result-fadein');
  card.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ── 時刻セレクト用ヘルパー ── */
function makeHourOpts(sel) {
  return Array.from({length:14},(_,i)=>i+8)
    .map(h=>`<option value="${String(h).padStart(2,'0')}" ${String(h).padStart(2,'0')===sel?'selected':''}>${String(h).padStart(2,'0')}</option>`)
    .join('');
}
function makeMinOpts(sel) {
  return Array.from({length:12},(_,i)=>i*5)
    .map(m=>`<option value="${String(m).padStart(2,'0')}" ${String(m).padStart(2,'0')===sel?'selected':''}>${String(m).padStart(2,'0')}</option>`)
    .join('');
}

/* ── 担当医変更 ── */
function onDoctorChange() {
  currentDoctor = document.getElementById('doctor-select').value;
  loadRouteFromSupabase();
}

/* ── 担当医ドロップダウンを患者データから構築 ── */
function buildDoctorSelect() {
  const sel = document.getElementById('doctor-select');
  const names = [...new Set(patients.map(p => p.doctor).filter(Boolean))].sort();
  names.forEach(name => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    sel.appendChild(opt);
  });
}

/* ── Supabaseにルートを保存 ── */
function scheduleAutoSave() {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(saveRouteToSupabase, 800);
}

async function saveRouteToSupabase() {
  if (!currentDoctor) return;
  const visitDate = document.getElementById('visit-date').value;
  if (!visitDate) return;
  const overrides = loadOverrides();
  const visitListJson = todayList.map(t => ({
    external_id: t.patient.external_id,
    duration: t.duration,
    override: overrides[t.patient.external_id] || null
  }));
  try {
    const { error } = await db.from('daily_routes').upsert({
      doctor: currentDoctor,
      visit_date: visitDate,
      visit_list_json: visitListJson,
      result_json: lastResult || null,
      distance_matrix_json: distanceCache || null,
      updated_at: new Date().toISOString()
    }, { onConflict: 'doctor,visit_date' });
    if (!error) {
      const now = new Date();
      const ts = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
      const el = document.getElementById('save-status');
      if (el) el.textContent = `💾 ${ts}保存`;
    }
  } catch(e) {
    // テーブル未作成の場合など、エラーは無視
    console.warn('保存失敗:', e.message);
  }
}

/* ── Supabaseからルートを読み込み ── */
async function loadRouteFromSupabase() {
  if (!currentDoctor) return;
  const visitDate = document.getElementById('visit-date').value;
  if (!visitDate) return;
  try {
    const { data, error } = await db.from('daily_routes')
      .select('*')
      .eq('doctor', currentDoctor)
      .eq('visit_date', visitDate)
      .maybeSingle();
    if (error || !data) return;
    // 患者リストを復元
    todayList.length = 0;
    const ovData = {};
    for (const item of (data.visit_list_json || [])) {
      const p = patients.find(x => x.external_id === item.external_id);
      if (p) {
        todayList.push({ patient: p, duration: item.duration });
        if (item.override) ovData[item.external_id] = item.override;
      }
    }
    // 今日だけ制約を復元（localStorageへ）
    if (Object.keys(ovData).length) {
      const existing = loadOverrides();
      Object.assign(existing, ovData);
      saveOverrides(existing);
    }
    // 距離行列を復元
    if (data.distance_matrix_json) distanceCache = data.distance_matrix_json;
    // 結果を復元
    if (data.result_json) {
      lastResult = data.result_json;
      const overrides = loadOverrides();
      const locations = [CLINIC, ...todayList.map(t => t.patient)];
      renderResult(lastResult, locations, visitDate, getDayName(visitDate), overrides);
      document.getElementById('result-card').style.display = '';
    }
    renderTodayList();
    const el = document.getElementById('save-status');
    if (el) {
      const d = new Date(data.updated_at);
      el.textContent = `💾 ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}読込`;
    }
  } catch(e) {
    console.warn('読込失敗:', e.message);
  }
}

/* ── 確定結果から患者をキャンセルして再計算 ── */
async function cancelPatientFromResult(externalId) {
  if (!confirm(`この患者をキャンセルしますか？\n残りの患者で時刻を再計算します。`)) return;
  if (!distanceCache) { alert('距離データがありません。再度最適化してください。'); return; }

  // todayListから削除
  const idx = todayList.findIndex(t => t.patient.external_id === externalId);
  if (idx === -1) return;
  todayList.splice(idx, 1);
  renderTodayList();

  if (todayList.length === 0) {
    document.getElementById('result-card').style.display = 'none';
    scheduleAutoSave();
    return;
  }

  // 確定済み順序を保持して時刻を再計算
  const dateStr = document.getElementById('visit-date').value;
  const dayName = getDayName(dateStr);

  // 既存resultのvisitsから残り患者の順序を取得
  const confirmedOrder = (lastResult?.visits || [])
    .filter(v => v.type === 'patient' && v.patient.external_id !== externalId)
    .map(v => v.patient.external_id);

  // todayListをconfirmedOrderに並べ直す
  const reordered = confirmedOrder
    .map(id => todayList.find(t => t.patient.external_id === id))
    .filter(Boolean);
  // confirmedOrderにない患者（念のため）を末尾に追加
  const inOrder = new Set(confirmedOrder);
  todayList.filter(t => !inOrder.has(t.patient.external_id)).forEach(t => reordered.push(t));
  todayList.length = 0;
  reordered.forEach(t => todayList.push(t));

  const btn = document.getElementById('optimize-btn');
  btn.disabled = true;
  btn.textContent = '再計算中…';

  try {
    const locations = [CLINIC, ...todayList.map(t => t.patient)];
    const matrix = await fetchDistanceMatrix(locations);
    distanceCache = matrix;

    const overrides = loadOverrides();
    const feasWins = todayList.map(t => patientFeasibleWindows(t.patient, dayName, overrides[t.patient.external_id]));
    const annotations = todayList.map(t => {
      const mp = t.patient.memo_parsed||{};
      const ov = overrides[t.patient.external_id];
      return {isFixed:ov?false:!!mp.fixed_time, fixedTime:(!ov&&mp.fixed_time)?timeToMin(mp.fixed_time):null, prefDays:mp.preferred_days||[], prefTime:mp.preferred_time};
    });
    const cfg = {
      firstMin: timeToMin(document.getElementById('first-min').value),
      firstTarget: timeToMin(document.getElementById('first-target').value),
      returnTarget: timeToMin(document.getElementById('return-target').value),
      lunchEnabled: document.getElementById('lunch-toggle').checked,
      lunchDuration: parseInt(document.getElementById('lunch-duration').value)||60,
      returnClinic: true
    };

    // 順番固定で再シミュレート（最適化なし）
    const order = [...Array(todayList.length).keys()];
    const result = simulateSchedule(order, matrix, todayList, feasWins, annotations, cfg);
    lastResult = result;
    renderResult(result, locations, dateStr, dayName, overrides);
    scheduleAutoSave();
  } catch(e) {
    alert('再計算に失敗しました: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '🪄 最適順に並び替え';
  }
}

/* ── Google Cloud Monitoring API 連携（Distance Matrix 実使用量取得） ── */
const GCP_PROJECT = 'houmon-navi-scheduler';
const GCP_CLIENT_ID = '978633506719-neerlkj1dhk4u2ea9d2iuomdba8948gb.apps.googleusercontent.com';
const GCP_REDIRECT_URI = 'https://kmrshtp-alt.github.io/houmon-navi/';
const GCP_SCOPE = 'https://www.googleapis.com/auth/monitoring.read';
const GCP_TOKEN_KEY = 'gcp_oauth_token';

/* PKCE ユーティリティ */
function gcpGenerateCodeVerifier() {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  let v = '';
  const arr = new Uint8Array(128);
  crypto.getRandomValues(arr);
  arr.forEach(b => { v += chars[b % chars.length]; });
  return v;
}

async function gcpCodeVerifierToChallenge(verifier) {
  const data = new TextEncoder().encode(verifier);
  const digest = await crypto.subtle.digest('SHA-256', data);
  return btoa(String.fromCharCode(...new Uint8Array(digest)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

/* OAuth 認可 URL への遷移（ポップアップ方式 → ページ遷移なし） */
async function gcpStartOAuth() {
  const verifier = gcpGenerateCodeVerifier();
  const challenge = await gcpCodeVerifierToChallenge(verifier);
  sessionStorage.setItem('gcp_pkce_verifier', verifier);
  const params = new URLSearchParams({
    client_id: GCP_CLIENT_ID,
    redirect_uri: GCP_REDIRECT_URI,
    response_type: 'code',
    scope: GCP_SCOPE,
    code_challenge: challenge,
    code_challenge_method: 'S256',
    access_type: 'offline',
    prompt: 'consent',
    state: 'gcp_monitoring_oauth',  // GCP OAuth と識別するための state
  });
  const authUrl = 'https://accounts.google.com/o/oauth2/v2/auth?' + params.toString();

  // ポップアップで開く（メインページから離れない）
  const popup = window.open(authUrl, 'gcp_oauth_popup', 'width=520,height=640,scrollbars=yes,resizable=yes');
  if (!popup) {
    // ポップアップブロック時はフォールバック（ページ遷移）
    window.location.href = authUrl;
    return;
  }

  // ポップアップから code をメッセージで受け取る
  const timer = setTimeout(() => window.removeEventListener('message', handler), 300000);
  async function handler(e) {
    if (e.data?.type !== 'gcp_oauth_code' || !e.data?.code) return;
    clearTimeout(timer);
    window.removeEventListener('message', handler);
    popup.close();
    try {
      const tokenObj = await gcpExchangeCode(e.data.code);
      await gcpSaveToken(tokenObj);
      showToast('✅ Google 認証が完了しました');
      const el = document.getElementById('maps-usage');
      if (el) { el.dataset.gcpLoggedIn = 'true'; }
      await gcpRefreshUsageDisplay();
    } catch(err) {
      console.error('OAuth コード交換失敗:', err);
      showToast('⚠️ Google 認証に失敗しました: ' + err.message);
    }
  }
  window.addEventListener('message', handler);
}

/* 認可コード → トークン交換 */
async function gcpExchangeCode(code) {
  const verifier = sessionStorage.getItem('gcp_pkce_verifier');
  if (!verifier) throw new Error('PKCE verifier が見つかりません');
  const resp = await fetch('https://oauth2.googleapis.com/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      client_id: GCP_CLIENT_ID,
      redirect_uri: GCP_REDIRECT_URI,
      grant_type: 'authorization_code',
      code,
      code_verifier: verifier,
    }).toString(),
  });
  if (!resp.ok) throw new Error('トークン交換失敗: ' + (await resp.text()));
  const json = await resp.json();
  sessionStorage.removeItem('gcp_pkce_verifier');
  return json;
}

/* トークン保存 */
async function gcpSaveToken(tokenObj) {
  tokenObj.expires_at = Date.now() + (tokenObj.expires_in || 3600) * 1000;
  await db.from('app_settings').upsert(
    { key: GCP_TOKEN_KEY, value: JSON.stringify(tokenObj), updated_at: new Date().toISOString() },
    { onConflict: 'key' }
  );
}

/* トークン読み込み */
async function gcpLoadToken() {
  try {
    const { data } = await db.from('app_settings').select('value').eq('key', GCP_TOKEN_KEY).maybeSingle();
    if (data?.value) return JSON.parse(data.value);
  } catch(e) { /* ignore */ }
  return null;
}

/* トークンリフレッシュ */
async function gcpRefreshToken(refreshToken) {
  const resp = await fetch('https://oauth2.googleapis.com/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      client_id: GCP_CLIENT_ID,
      grant_type: 'refresh_token',
      refresh_token: refreshToken,
    }).toString(),
  });
  if (!resp.ok) throw new Error('トークンリフレッシュ失敗: ' + (await resp.text()));
  return await resp.json();
}

/* 有効なアクセストークンを取得（期限切れなら自動更新） */
async function gcpGetAccessToken() {
  let token = await gcpLoadToken();
  if (!token) return null;
  if (token.expires_at && Date.now() > token.expires_at - 60000) {
    // 有効期限切れ（1分前） → リフレッシュ
    if (!token.refresh_token) return null;
    try {
      const refreshed = await gcpRefreshToken(token.refresh_token);
      refreshed.refresh_token = refreshed.refresh_token || token.refresh_token;
      await gcpSaveToken(refreshed);
      token = refreshed;
    } catch(e) {
      console.warn('トークンリフレッシュ失敗:', e.message);
      return null;
    }
  }
  return token.access_token || null;
}

/* Monitoring API で今月の Distance Matrix リクエスト数を取得 */
async function gcpFetchMonthlyUsage() {
  const accessToken = await gcpGetAccessToken();
  if (!accessToken) return null;

  const now = new Date();
  const startTime = new Date(now.getFullYear(), now.getMonth(), 1).toISOString();
  const endTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59).toISOString();

  const params = new URLSearchParams({
    'filter': 'metric.type="serviceruntime.googleapis.com/api/request_count" AND resource.labels.service="distance-matrix-backend.googleapis.com"',
    'interval.startTime': startTime,
    'interval.endTime': endTime,
    'aggregation.alignmentPeriod': '2678400s',
    'aggregation.perSeriesAligner': 'ALIGN_SUM',
    'aggregation.crossSeriesReducer': 'REDUCE_SUM',
    'aggregation.groupByFields': 'resource.labels.service',
  });

  const resp = await fetch(
    `https://monitoring.googleapis.com/v3/projects/${GCP_PROJECT}/timeSeries?${params.toString()}`,
    { headers: { 'Authorization': 'Bearer ' + accessToken } }
  );
  if (!resp.ok) {
    const errText = await resp.text();
    throw new Error(`Monitoring API エラー ${resp.status}: ${errText}`);
  }
  const json = await resp.json();
  const point = json?.timeSeries?.[0]?.points?.[0]?.value;
  if (!point) return 0;
  return parseInt(point.int64Value || point.doubleValue || '0') || 0;
}

/* UI: maps-usage 表示を拡張 */
function updateMapsUsageDisplay() {
  const el = document.getElementById('maps-usage');
  if (!el) return;
  const used = getMapsUsed();
  const pct = Math.min(100, Math.round(used / MAPS_FREE_LIMIT * 100));
  const color = pct >= 90 ? '#c53030' : pct >= 70 ? '#92400e' : '#1a6b40';
  const gcpHtml = el.dataset.gcpCount != null
    ? ` / 実測: <span style="color:#1e3d6e;font-weight:700">${parseInt(el.dataset.gcpCount).toLocaleString()} req</span>`
    : '';
  const loginBtn = el.dataset.gcpLoggedIn === 'false'
    ? ` <button onclick="gcpStartOAuth()" style="font-size:10px;padding:2px 7px;background:#1e3d6e;color:white;border:none;border-radius:4px;cursor:pointer;font-family:inherit">Google でログイン</button>`
    : ` <button onclick="gcpRefreshUsageDisplay()" style="font-size:10px;padding:2px 7px;background:#edf2fa;color:#1e3d6e;border:none;border-radius:4px;cursor:pointer;font-family:inherit" id="gcp-refresh-btn">🔄 Google から更新</button>`;
  el.innerHTML = `Google Maps 今月: <span style="color:${color};font-weight:700">${used.toLocaleString()} / ${MAPS_FREE_LIMIT.toLocaleString()} 要素（${pct}%）</span>${gcpHtml}${loginBtn}`;
}

/* ログイン状態を確認してUIを初期化 */
async function gcpInitDisplay() {
  const el = document.getElementById('maps-usage');
  if (!el) return;
  const token = await gcpLoadToken();
  if (token) {
    el.dataset.gcpLoggedIn = 'true';
  } else {
    el.dataset.gcpLoggedIn = 'false';
  }
  updateMapsUsageDisplay();
}

/* 「🔄 Google から更新」ボタン処理 */
async function gcpRefreshUsageDisplay() {
  const btn = document.getElementById('gcp-refresh-btn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ 取得中…'; }
  try {
    const count = await gcpFetchMonthlyUsage();
    const el = document.getElementById('maps-usage');
    if (el) {
      if (count === null) {
        el.dataset.gcpLoggedIn = 'false';
      } else {
        el.dataset.gcpCount = String(count);
        el.dataset.gcpLoggedIn = 'true';
      }
    }
  } catch(e) {
    console.warn('Monitoring API 取得失敗:', e.message);
    showToast('⚠️ Google からの取得に失敗しました: ' + e.message);
  }
  updateMapsUsageDisplay();
}

/* ページロード時に ?code= を処理 */
async function gcpHandleRedirectCode() {
  const urlParams = new URLSearchParams(window.location.search);
  const code = urlParams.get('code');
  const state = urlParams.get('state');
  // GCP OAuth のコールバックかどうか判定
  if (!code || state !== 'gcp_monitoring_oauth') return;

  // URL から code/state を除去
  history.replaceState({}, document.title, window.location.pathname);

  // ★ポップアップ内にいる場合 → 親ウィンドウにコードを送って閉じる
  if (window.opener) {
    window.opener.postMessage({ type: 'gcp_oauth_code', code }, '*');
    setTimeout(() => window.close(), 300);
    return;
  }

  // フォールバック：ポップアップブロックでページ遷移した場合
  try {
    const tokenObj = await gcpExchangeCode(code);
    await gcpSaveToken(tokenObj);
    showToast('✅ Google 認証が完了しました');
    const el = document.getElementById('maps-usage');
    if (el) { el.dataset.gcpLoggedIn = 'true'; }
    await gcpRefreshUsageDisplay();
  } catch(e) {
    console.error('OAuth コード交換失敗:', e);
    showToast('⚠️ Google 認証に失敗しました: ' + e.message);
  }
}

/* ── 初回起動 ── */
(async () => {
  // OAuth リダイレクトコードの処理（ログイン前でも実行）
  await gcpHandleRedirectCode();

  const { data: { session } } = await db.auth.getSession();
  if (session) {
    document.getElementById('login-screen').style.display = 'none';
    init();
  }
})();
