<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>訪問診療ナビ</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
  background: #f1f5f9;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ── */
header {
  background: #1d4ed8;
  color: white;
  padding: 0 24px;
  height: 54px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
header h1 { font-size: 17px; font-weight: 800; }
.header-right { display: flex; align-items: center; gap: 20px; }
.tabs { display: flex; gap: 4px; }
.tab {
  padding: 7px 18px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  color: rgba(255,255,255,0.65);
  transition: all 0.15s;
  border: none;
  background: none;
}
.tab:hover { background: rgba(255,255,255,0.15); color: white; }
.tab.active { background: rgba(255,255,255,0.2); color: white; }
.status-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; color: rgba(255,255,255,0.75); }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
.dot.err { background: #f87171; }
.dot.loading { background: #fbbf24; }

/* ── Main ── */
main { flex: 1; overflow: hidden; display: flex; }

/* ── Route Screen ── */
#route-screen {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px;
  overflow-y: auto;
}

.route-card {
  background: white;
  border-radius: 20px;
  padding: 40px 44px;
  width: 100%;
  max-width: 560px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.09);
}

/* ── Route Rows ── */
.route-row { padding: 18px 0; position: relative; }
.route-row + .route-row { border-top: 1px solid #f1f5f9; }

.rlabel {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.rlabel.from { color: #16a34a; }
.rlabel.to   { color: #dc2626; }

/* Autocomplete input */
.route-input-wrap { position: relative; }

.route-input {
  width: 100%;
  border: 2px solid #e2e8f0;
  border-radius: 10px;
  padding: 12px 36px 12px 14px;
  font-size: 18px;
  font-weight: 600;
  color: #0f172a;
  font-family: inherit;
  outline: none;
  background: #f8fafc;
  transition: border-color 0.15s, background 0.15s;
}
.route-input::placeholder { color: #cbd5e1; font-weight: 400; font-size: 16px; }
.route-input:focus { border-color: #1d4ed8; background: white; }
.route-input.selected-from { border-color: #16a34a; background: #f0fdf4; }
.route-input.selected-to   { border-color: #dc2626; background: #fff1f2; }

.clear-btn {
  position: absolute;
  right: 10px; top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: #94a3b8;
  font-size: 18px;
  cursor: pointer;
  line-height: 1;
  display: none;
  padding: 4px;
}
.clear-btn.visible { display: block; }

.raddr {
  font-size: 12px;
  color: #94a3b8;
  margin-top: 5px;
  padding-left: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Suggest dropdown */
.suggest-list {
  position: absolute;
  top: calc(100% + 2px);
  left: 0; right: 0;
  background: white;
  border: 1.5px solid #1d4ed8;
  border-radius: 12px;
  box-shadow: 0 8px 28px rgba(0,0,0,0.13);
  z-index: 200;
  overflow: hidden;
  display: none;
}
.suggest-item {
  padding: 11px 16px;
  cursor: pointer;
  border-bottom: 1px solid #f1f5f9;
  transition: background 0.1s;
}
.suggest-item:last-child { border-bottom: none; }
.suggest-item:hover, .suggest-item.active { background: #eff6ff; }
.s-name { font-size: 15px; font-weight: 700; color: #1e293b; }
.s-name mark { background: #fef08a; color: #1e293b; border-radius: 2px; padding: 0 1px; }
.s-furi { font-size: 11px; color: #94a3b8; margin-top: 1px; }
.s-addr { font-size: 11px; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.suggest-empty { padding: 14px 16px; font-size: 13px; color: #94a3b8; text-align: center; }

/* Swap & Navigate */
.swap-row { display: flex; justify-content: center; padding: 4px 0; }
.swap-btn {
  background: white;
  border: 2px solid #1d4ed8;
  border-radius: 50%;
  width: 36px; height: 36px;
  cursor: pointer;
  color: #1d4ed8;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.swap-btn:hover { background: #eff6ff; transform: rotate(180deg); }

.nav-btn {
  width: 100%;
  background: #1d4ed8;
  color: white;
  border: none;
  border-radius: 14px;
  padding: 17px;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
  margin-top: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  box-shadow: 0 4px 16px rgba(29,78,216,0.35);
  transition: all 0.15s;
  font-family: inherit;
}
.nav-btn:hover:not(:disabled) { background: #1e40af; transform: translateY(-1px); }
.nav-btn:disabled { background: #e2e8f0; color: #94a3b8; box-shadow: none; cursor: default; transform: none; }

/* ── Manage Screen ── */
#manage-screen { display: none; width: 100%; overflow-y: auto; padding: 32px; }
.manage-inner { max-width: 720px; margin: 0 auto; }

.card { background: white; border-radius: 16px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); margin-bottom: 24px; }
.card-header { padding: 18px 24px 14px; border-bottom: 1px solid #f1f5f9; font-size: 14px; font-weight: 700; color: #475569; }
.card-body { padding: 20px 24px; }

.form-row { display: flex; gap: 12px; align-items: flex-end; }
.fg { flex: 1; }
.fg label { display: block; font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }

input[type="text"] {
  width: 100%;
  border: 1.5px solid #e2e8f0;
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 14px;
  outline: none;
  font-family: inherit;
  color: #1e293b;
  background: #f8fafc;
  transition: border-color 0.15s;
}
input[type="text"]:focus { border-color: #1d4ed8; background: white; }

.add-btn {
  background: #16a34a; color: white; border: none; border-radius: 8px;
  padding: 0 22px; font-size: 14px; font-weight: 700; cursor: pointer;
  height: 40px; white-space: nowrap; font-family: inherit; transition: background 0.15s; flex-shrink: 0;
}
.add-btn:hover { background: #15803d; }
.add-btn:disabled { background: #94a3b8; cursor: default; }

.tbl-head {
  display: grid; grid-template-columns: 160px 1fr 72px;
  padding: 10px 24px; background: #f8fafc; border-bottom: 1px solid #e2e8f0;
  font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.06em;
}
.tbl-row {
  display: grid; grid-template-columns: 160px 1fr 72px;
  padding: 13px 24px; border-bottom: 1px solid #f8fafc; align-items: center; transition: background 0.1s;
}
.tbl-row:hover { background: #fafafa; }
.tbl-row:last-child { border-bottom: none; }
.tbl-name { font-weight: 700; font-size: 15px; color: #1e293b; }
.tbl-addr { font-size: 13px; color: #64748b; padding-right: 12px; }
.del-btn {
  background: none; border: 1.5px solid #fca5a5; border-radius: 6px;
  color: #ef4444; font-size: 12px; font-weight: 700; padding: 4px 10px;
  cursor: pointer; transition: all 0.12s; font-family: inherit;
}
.del-btn:hover { background: #fee2e2; border-color: #ef4444; }

.empty-msg { text-align: center; padding: 48px 24px; color: #94a3b8; font-size: 14px; line-height: 1.7; }

/* CSV */
.csv-drop {
  border: 2px dashed #cbd5e1; border-radius: 10px; padding: 28px;
  text-align: center; cursor: pointer; transition: all 0.15s; color: #94a3b8; font-size: 14px; line-height: 1.7;
}
.csv-drop:hover, .csv-drop.drag-over { border-color: #1d4ed8; background: #eff6ff; color: #1d4ed8; }
.csv-drop strong { display: block; font-size: 15px; margin-bottom: 4px; color: #475569; }
.csv-preview { margin-top: 14px; background: #f0fdf4; border: 1px solid #86efac; border-radius: 8px; padding: 12px 16px; font-size: 13px; color: #15803d; display: none; align-items: center; justify-content: space-between; gap: 12px; }
.import-btn { background: #16a34a; color: white; border: none; border-radius: 7px; padding: 8px 20px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; white-space: nowrap; transition: background 0.15s; }
.import-btn:hover { background: #15803d; }
.import-btn:disabled { background: #94a3b8; cursor: default; }
.csv-note { font-size: 12px; color: #94a3b8; margin-top: 10px; line-height: 1.6; }
</style>
</head>
<body>

<header>
  <h1>🚗 訪問診療ナビ</h1>
  <div class="header-right">
    <div class="tabs">
      <button class="tab active" onclick="showTab('route')">ルート検索</button>
      <button class="tab" onclick="showTab('manage')">患者管理</button>
    </div>
    <div class="status-badge">
      <span class="dot loading" id="dot"></span>
      <span id="status-txt">接続中...</span>
    </div>
  </div>
</header>

<main>

  <!-- ルート検索 -->
  <div id="route-screen">
    <div class="route-card">

      <!-- 出発 -->
      <div class="route-row">
        <div class="rlabel from">出発</div>
        <div class="route-input-wrap">
          <input class="route-input" id="from-input" type="text" placeholder="患者名を入力..." autocomplete="off">
          <button class="clear-btn" id="from-clear" onclick="clearSlot('from')">✕</button>
          <div class="suggest-list" id="from-suggest"></div>
        </div>
        <div class="raddr" id="from-addr"></div>
      </div>

      <div class="swap-row">
        <button class="swap-btn" onclick="swapPatients()" title="出発と到着を入れ替え">⇅</button>
      </div>

      <!-- 到着 -->
      <div class="route-row">
        <div class="rlabel to">到着</div>
        <div class="route-input-wrap">
          <input class="route-input" id="to-input" type="text" placeholder="患者名を入力..." autocomplete="off">
          <button class="clear-btn" id="to-clear" onclick="clearSlot('to')">✕</button>
          <div class="suggest-list" id="to-suggest"></div>
        </div>
        <div class="raddr" id="to-addr"></div>
      </div>

      <button class="nav-btn" id="nav-btn" onclick="openMaps()" disabled>
        🗺️ Google マップで案内
      </button>

    </div>
  </div>

  <!-- 患者管理 -->
  <div id="manage-screen">
    <div class="manage-inner">

      <div class="card">
        <div class="card-header">CSVで一括インポート</div>
        <div class="card-body">
          <div class="csv-drop" id="csv-drop" onclick="document.getElementById('csv-file').click()">
            <strong>CSVファイルをここにドラッグ＆ドロップ</strong>
            またはクリックしてファイルを選択
          </div>
          <input type="file" id="csv-file" accept=".csv" style="display:none">
          <div class="csv-preview" id="csv-preview">
            <span id="csv-preview-text"></span>
            <button class="import-btn" id="import-btn" onclick="importCSV()">インポート実行</button>
          </div>
          <div class="csv-note">
            モバカルのエクスポートCSVをそのまま使えます（名前・フリガナ・郵便番号・住所の列があればOK）<br>
            ExcelでCSV保存する際は「CSV UTF-8」形式を選んでください
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">患者を追加</div>
        <div class="card-body">
          <div class="form-row">
            <div class="fg">
              <label>患者名</label>
              <input type="text" id="new-name" placeholder="例：田中 花子 様" autocomplete="off">
            </div>
            <div class="fg" style="flex:2">
              <label>住所</label>
              <input type="text" id="new-addr" placeholder="例：福岡市早良区..." autocomplete="off">
            </div>
            <button class="add-btn" id="add-btn" onclick="addPatient()">＋ 追加</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="tbl-head"><div>患者名</div><div>住所</div><div></div></div>
        <div id="patient-list"></div>
      </div>

    </div>
  </div>

</main>

<script>
const SUPABASE_URL = 'https://hnsvhvhuxcyctblkahga.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhuc3Zodmh1eGN5Y3RibGthaGdhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NDExMDAsImV4cCI6MjA5NDExNzEwMH0.SYBiFwnOOoZibXrdEkP-afVOlIv2y1P_qYgxLn94YsA';

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let patients = [];
let fromPatient = null;
let toPatient   = null;

/* ── データ ── */
async function load() {
  const { data, error } = await db.from('patients').select('*')
    .order('sort_order').order('created_at');
  if (error) { setStatus('err', '接続エラー'); return; }
  setStatus('ok', '同期中');
  patients = data || [];
  renderList();
}

async function addPatient() {
  const name    = document.getElementById('new-name').value.trim();
  const address = document.getElementById('new-addr').value.trim();
  if (!name || !address) { alert('患者名と住所を入力してください'); return; }
  const btn = document.getElementById('add-btn');
  btn.disabled = true; btn.textContent = '追加中...';
  const { error } = await db.from('patients').insert({ name, address, furigana: '' });
  btn.disabled = false; btn.textContent = '＋ 追加';
  if (error) { alert('追加に失敗しました\n' + error.message); return; }
  document.getElementById('new-name').value = '';
  document.getElementById('new-addr').value = '';
  await load();
}

async function deletePatient(id) {
  const p = patients.find(x => x.id === id);
  if (!p || !confirm(`「${p.name}」を削除しますか？`)) return;
  if (fromPatient?.id === id) clearSlot('from');
  if (toPatient?.id === id)   clearSlot('to');
  await db.from('patients').delete().eq('id', id);
  await load();
}

db.channel('patients')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'patients' }, load)
  .subscribe();

/* ── ステータス ── */
function setStatus(state, text) {
  document.getElementById('dot').className = 'dot' + (state === 'ok' ? '' : state === 'err' ? ' err' : ' loading');
  document.getElementById('status-txt').textContent = text;
}

/* ── タブ ── */
function showTab(tab) {
  document.getElementById('route-screen').style.display  = tab === 'route'  ? 'flex' : 'none';
  document.getElementById('manage-screen').style.display = tab === 'manage' ? 'block' : 'none';
  document.querySelectorAll('.tab').forEach((el, i) =>
    el.classList.toggle('active', tab === 'route' ? i === 0 : i === 1));
}

/* ── オートコンプリート ── */
function toHira(s) {
  return (s || '').replace(/[ァ-ヶ]/g, c => String.fromCharCode(c.charCodeAt(0) - 0x60));
}

function matchQ(p, q) {
  const hq = toHira(q);
  return p.name.includes(q) ||
         toHira(p.furigana || '').startsWith(hq) ||
         (p.furigana || '').startsWith(q);
}

function setupAutocomplete(slot) {
  const input   = document.getElementById(`${slot}-input`);
  const sugList = document.getElementById(`${slot}-suggest`);
  let idx = -1;

  input.addEventListener('input', () => {
    idx = -1;
    const q = input.value.trim();
    if (!q) { sugList.style.display = 'none'; return; }

    const hits = patients.filter(p => matchQ(p, q)).slice(0, 8);
    if (hits.length === 0) {
      sugList.innerHTML = '<div class="suggest-empty">該当なし</div>';
      sugList.style.display = 'block';
      return;
    }

    sugList.innerHTML = hits.map(p => {
      const hq   = toHira(input.value.trim());
      const hira = toHira(p.furigana || '');
      const hiName = esc(p.name).replace(esc(input.value.trim()), m => `<mark>${m}</mark>`);
      const hiFuri = hira ? esc(hira).replace(esc(hq), m => `<mark>${m}</mark>`) : '';
      return `<div class="suggest-item" data-id="${p.id}">
        <div class="s-name">${hiName}</div>
        ${hiFuri ? `<div class="s-furi">${hiFuri}</div>` : ''}
        <div class="s-addr">${esc(p.address)}</div>
      </div>`;
    }).join('');

    sugList.querySelectorAll('.suggest-item').forEach(el => {
      el.addEventListener('mousedown', e => {
        e.preventDefault();
        const p = patients.find(x => x.id === el.dataset.id);
        if (p) selectPatient(slot, p);
      });
    });

    sugList.style.display = 'block';
  });

  input.addEventListener('keydown', e => {
    const items = sugList.querySelectorAll('.suggest-item');
    if (e.key === 'ArrowDown') { e.preventDefault(); idx = Math.min(idx+1, items.length-1); highlightSuggest(items, idx); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); idx = Math.max(idx-1, 0); highlightSuggest(items, idx); }
    else if (e.key === 'Enter' && idx >= 0) { e.preventDefault(); items[idx]?.dispatchEvent(new MouseEvent('mousedown')); }
    else if (e.key === 'Escape') { sugList.style.display = 'none'; }
  });

  input.addEventListener('blur', () => setTimeout(() => { sugList.style.display = 'none'; }, 150));
}

function highlightSuggest(items, idx) {
  items.forEach((el, i) => el.classList.toggle('active', i === idx));
}

function selectPatient(slot, p) {
  if (slot === 'from') {
    fromPatient = p;
    const el = document.getElementById('from-input');
    el.value = p.name;
    el.classList.remove('selected-to'); el.classList.add('selected-from');
    document.getElementById('from-addr').textContent = p.address;
    document.getElementById('from-clear').classList.add('visible');
  } else {
    toPatient = p;
    const el = document.getElementById('to-input');
    el.value = p.name;
    el.classList.remove('selected-from'); el.classList.add('selected-to');
    document.getElementById('to-addr').textContent = p.address;
    document.getElementById('to-clear').classList.add('visible');
  }
  document.getElementById(`${slot}-suggest`).style.display = 'none';
  updateNavBtn();
}

function clearSlot(slot) {
  if (slot === 'from') { fromPatient = null; }
  else                 { toPatient = null; }
  const el = document.getElementById(`${slot}-input`);
  el.value = '';
  el.className = 'route-input';
  document.getElementById(`${slot}-addr`).textContent = '';
  document.getElementById(`${slot}-clear`).classList.remove('visible');
  updateNavBtn();
}

function swapPatients() {
  const tmp = fromPatient;
  fromPatient = toPatient;
  toPatient   = tmp;
  if (fromPatient) selectPatient('from', fromPatient);
  else clearSlot('from');
  if (toPatient)   selectPatient('to', toPatient);
  else clearSlot('to');
}

function updateNavBtn() {
  document.getElementById('nav-btn').disabled = !fromPatient || !toPatient;
}

function openMaps() {
  if (!fromPatient || !toPatient) return;
  const o = encodeURIComponent(fromPatient.address);
  const d = encodeURIComponent(toPatient.address);
  window.open(`https://www.google.com/maps/dir/?api=1&origin=${o}&destination=${d}&travelmode=driving`, '_blank');
}

/* ── 患者一覧描画 ── */
function renderList() {
  const list = document.getElementById('patient-list');
  if (patients.length === 0) {
    list.innerHTML = '<div class="empty-msg">まだ患者が登録されていません</div>';
    return;
  }
  list.innerHTML = patients.map(p => `
    <div class="tbl-row">
      <div class="tbl-name">${esc(p.name)}</div>
      <div class="tbl-addr">${esc(p.address)}</div>
      <div><button class="del-btn" data-id="${p.id}">削除</button></div>
    </div>
  `).join('');
  list.querySelectorAll('.del-btn').forEach(btn =>
    btn.addEventListener('click', () => deletePatient(btn.dataset.id)));
}

/* ── CSV インポート ── */
let csvRows = [];

function setupCSV() {
  const fileInput = document.getElementById('csv-file');
  const drop = document.getElementById('csv-drop');
  fileInput.addEventListener('change', e => parseCSVFile(e.target.files[0]));
  drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag-over'); });
  drop.addEventListener('dragleave', () => drop.classList.remove('drag-over'));
  drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('drag-over'); parseCSVFile(e.dataTransfer.files[0]); });
}

function parseCSVFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const buf = e.target.result;
    let text = new TextDecoder('utf-8', { fatal: false }).decode(buf);
    if ((text.match(/�/g) || []).length > 3) {
      try { text = new TextDecoder('shift-jis').decode(buf); } catch(e) {}
    }

    const lines = text.split(/\r?\n/).filter(l => l.trim());
    if (lines.length < 2) { alert('データが見つかりません'); return; }

    const cols = splitCSVLine(lines[0]).map(c => c.trim());
    const NAME_KEYS = ['名前','氏名','患者名','お名前','name'];
    const ADDR_KEYS = ['住所','address','所在地'];
    const FURI_KEYS = ['フリガナ','ふりがな','読み','かな','furigana'];

    const ni = cols.findIndex(c => NAME_KEYS.some(k => c.includes(k)));
    const ai = cols.findIndex(c => ADDR_KEYS.some(k => c.includes(k)));
    const fi = cols.findIndex(c => FURI_KEYS.some(k => c.includes(k)));

    if (ni === -1) { alert(`名前の列が見つかりません。\n検出された列：${cols.join('、')}`); return; }
    if (ai === -1) { alert(`住所の列が見つかりません。\n検出された列：${cols.join('、')}`); return; }

    csvRows = [];
    for (let i = 1; i < lines.length; i++) {
      const cells = splitCSVLine(lines[i]);
      const name     = (cells[ni] || '').trim();
      const address  = (cells[ai] || '').trim();
      const furigana = fi >= 0 ? (cells[fi] || '').trim() : '';
      if (name && address) csvRows.push({ name, address, furigana });
    }

    if (csvRows.length === 0) { alert('有効なデータが見つかりませんでした'); return; }

    const furiMsg = fi >= 0 ? `・フリガナあり` : '';
    document.getElementById('csv-preview-text').textContent = `${csvRows.length}件を検出${furiMsg}`;
    document.getElementById('csv-preview').style.display = 'flex';
  };
  reader.readAsArrayBuffer(file);
}

function splitCSVLine(line) {
  const result = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') inQ = !inQ;
    else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
    else cur += c;
  }
  result.push(cur);
  return result;
}

async function importCSV() {
  if (csvRows.length === 0) return;
  const btn = document.getElementById('import-btn');
  btn.disabled = true;
  let done = 0;
  const CHUNK = 50;
  for (let i = 0; i < csvRows.length; i += CHUNK) {
    const { error } = await db.from('patients').insert(csvRows.slice(i, i + CHUNK));
    if (error) { alert(`エラー（${done}件処理済み）\n${error.message}`); break; }
    done += Math.min(CHUNK, csvRows.length - i);
    btn.textContent = `${done}/${csvRows.length}件...`;
  }
  btn.disabled = false; btn.textContent = 'インポート実行';
  document.getElementById('csv-preview').style.display = 'none';
  document.getElementById('csv-file').value = '';
  csvRows = [];
  alert(`${done}件のインポートが完了しました。`);
  await load();
}

/* ── ユーティリティ ── */
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('new-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('new-addr').focus();
});
document.getElementById('new-addr').addEventListener('keydown', e => {
  if (e.key === 'Enter') addPatient();
});

/* ── 起動 ── */
setupAutocomplete('from');
setupAutocomplete('to');
setupCSV();
load();
</script>
