<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>訪問診療ナビ</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
  background: #f1f5f9;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ── */
header {
  background: #1d4ed8;
  color: white;
  padding: 0 24px;
  height: 54px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
header h1 { font-size: 17px; font-weight: 800; letter-spacing: -0.3px; }

.header-right { display: flex; align-items: center; gap: 20px; }

.tabs { display: flex; gap: 4px; }
.tab {
  padding: 7px 18px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  color: rgba(255,255,255,0.65);
  transition: all 0.15s;
  border: none;
  background: none;
}
.tab:hover { background: rgba(255,255,255,0.15); color: white; }
.tab.active { background: rgba(255,255,255,0.2); color: white; }

.status-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: rgba(255,255,255,0.75);
}
.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #22c55e;
  flex-shrink: 0;
}
.dot.err { background: #f87171; }
.dot.loading { background: #fbbf24; }

/* ── Main ── */
main { flex: 1; overflow: hidden; display: flex; }

/* ── Route Screen ── */
#route-screen {
  display: flex;
  width: 100%;
  height: 100%;
}

/* Left: patient list */
.patient-panel {
  width: 300px;
  min-width: 240px;
  background: white;
  border-right: 1px solid #e2e8f0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}
.panel-title {
  padding: 16px 18px 10px;
  border-bottom: 1px solid #f1f5f9;
}
.panel-title h2 {
  font-size: 11px;
  font-weight: 800;
  color: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  margin-bottom: 3px;
}
.panel-hint {
  font-size: 12px;
  color: #cbd5e1;
  line-height: 1.4;
}
.panel-hint .lbl {
  display: inline-block;
  padding: 0 5px;
  border-radius: 3px;
  font-weight: 700;
  font-size: 11px;
}
.lbl-from { background: #dcfce7; color: #16a34a; }
.lbl-to   { background: #fee2e2; color: #dc2626; }

.p-list { flex: 1; overflow-y: auto; padding: 10px; }

.p-btn {
  width: 100%;
  background: #f8fafc;
  border: 1.5px solid #e2e8f0;
  border-radius: 9px;
  padding: 11px 14px;
  text-align: left;
  cursor: pointer;
  font-size: 15px;
  font-weight: 600;
  color: #334155;
  margin-bottom: 5px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: all 0.12s;
  font-family: inherit;
}
.p-btn:hover { background: #f0f4ff; border-color: #bfdbfe; }
.p-btn.from-sel { background: #f0fdf4; border-color: #22c55e; color: #15803d; }
.p-btn.to-sel   { background: #fff1f2; border-color: #f87171; color: #b91c1c; }

.p-badge {
  font-size: 10px;
  font-weight: 800;
  padding: 2px 7px;
  border-radius: 4px;
  letter-spacing: 0.04em;
  flex-shrink: 0;
}
.from-sel .p-badge { background: #16a34a; color: white; }
.to-sel   .p-badge { background: #dc2626; color: white; }

/* Right: route card */
.route-panel {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px;
  overflow-y: auto;
}

.route-card {
  background: white;
  border-radius: 18px;
  padding: 36px 40px;
  width: 100%;
  max-width: 500px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

.route-row { padding: 16px 0; }
.route-row + .route-row { border-top: 1px solid #f1f5f9; }

.rlabel {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.rlabel.from { color: #16a34a; }
.rlabel.to   { color: #dc2626; }

.rname {
  font-size: 24px;
  font-weight: 800;
  color: #0f172a;
  line-height: 1.2;
}
.rname.empty {
  font-size: 16px;
  color: #cbd5e1;
  font-weight: 400;
  font-style: italic;
}
.raddr {
  font-size: 13px;
  color: #94a3b8;
  margin-top: 5px;
}

.swap-row {
  display: flex;
  justify-content: center;
  padding: 6px 0;
}
.swap-btn {
  background: white;
  border: 2px solid #1d4ed8;
  border-radius: 50%;
  width: 36px; height: 36px;
  cursor: pointer;
  color: #1d4ed8;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.swap-btn:hover { background: #eff6ff; transform: rotate(180deg); }

.nav-btn {
  width: 100%;
  background: #1d4ed8;
  color: white;
  border: none;
  border-radius: 14px;
  padding: 17px;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
  margin-top: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  box-shadow: 0 4px 16px rgba(29,78,216,0.35);
  transition: all 0.15s;
  font-family: inherit;
}
.nav-btn:hover:not(:disabled) {
  background: #1e40af;
  box-shadow: 0 6px 20px rgba(29,78,216,0.4);
  transform: translateY(-1px);
}
.nav-btn:disabled {
  background: #e2e8f0;
  color: #94a3b8;
  box-shadow: none;
  cursor: default;
  transform: none;
}

/* ── Manage Screen ── */
#manage-screen {
  display: none;
  width: 100%;
  overflow-y: auto;
  padding: 32px;
}
.manage-inner {
  max-width: 720px;
  margin: 0 auto;
}

.card {
  background: white;
  border-radius: 16px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.06);
  margin-bottom: 24px;
}
.card-header {
  padding: 18px 24px 14px;
  border-bottom: 1px solid #f1f5f9;
  font-size: 14px;
  font-weight: 700;
  color: #475569;
}
.card-body { padding: 20px 24px; }

.form-row {
  display: flex;
  gap: 12px;
  align-items: flex-end;
}
.fg { flex: 1; }
.fg label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  color: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 6px;
}
input[type="text"] {
  width: 100%;
  border: 1.5px solid #e2e8f0;
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 14px;
  outline: none;
  font-family: inherit;
  color: #1e293b;
  background: #f8fafc;
  transition: border-color 0.15s;
}
input[type="text"]:focus { border-color: #1d4ed8; background: white; }

.add-btn {
  background: #16a34a;
  color: white;
  border: none;
  border-radius: 8px;
  padding: 0 22px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  height: 40px;
  white-space: nowrap;
  font-family: inherit;
  transition: background 0.15s;
  flex-shrink: 0;
}
.add-btn:hover { background: #15803d; }
.add-btn:disabled { background: #94a3b8; cursor: default; }

/* Table */
.tbl-head {
  display: grid;
  grid-template-columns: 160px 1fr 72px;
  padding: 10px 24px;
  background: #f8fafc;
  border-bottom: 1px solid #e2e8f0;
  font-size: 11px;
  font-weight: 700;
  color: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.tbl-row {
  display: grid;
  grid-template-columns: 160px 1fr 72px;
  padding: 13px 24px;
  border-bottom: 1px solid #f8fafc;
  align-items: center;
  transition: background 0.1s;
}
.tbl-row:hover { background: #fafafa; }
.tbl-row:last-child { border-bottom: none; }
.tbl-name { font-weight: 700; font-size: 15px; color: #1e293b; }
.tbl-addr { font-size: 13px; color: #64748b; padding-right: 12px; }

.del-btn {
  background: none;
  border: 1.5px solid #fca5a5;
  border-radius: 6px;
  color: #ef4444;
  font-size: 12px;
  font-weight: 700;
  padding: 4px 10px;
  cursor: pointer;
  transition: all 0.12s;
  font-family: inherit;
}
.del-btn:hover { background: #fee2e2; border-color: #ef4444; }

.empty-msg {
  text-align: center;
  padding: 48px 24px;
  color: #94a3b8;
  font-size: 14px;
  line-height: 1.7;
}
</style>
</head>
<body>

<header>
  <h1>🚗 訪問診療ナビ</h1>
  <div class="header-right">
    <div class="tabs">
      <button class="tab active" onclick="showTab('route')">ルート検索</button>
      <button class="tab" onclick="showTab('manage')">患者管理</button>
    </div>
    <div class="status-badge">
      <span class="dot loading" id="dot"></span>
      <span id="status-txt">接続中...</span>
    </div>
  </div>
</header>

<main>

  <!-- ルート検索 -->
  <div id="route-screen">

    <div class="patient-panel">
      <div class="panel-title">
        <h2>患者一覧</h2>
        <div class="panel-hint">
          1クリック目 → <span class="lbl lbl-from">出発</span>&nbsp;
          2クリック目 → <span class="lbl lbl-to">到着</span>
        </div>
      </div>
      <div class="p-list" id="patient-grid"></div>
    </div>

    <div class="route-panel">
      <div class="route-card">

        <div class="route-row">
          <div class="rlabel from">出発</div>
          <div class="rname empty" id="from-name">患者を選択してください</div>
          <div class="raddr" id="from-addr"></div>
        </div>

        <div class="swap-row">
          <button class="swap-btn" onclick="swapPatients()" title="出発と到着を入れ替え">⇅</button>
        </div>

        <div class="route-row">
          <div class="rlabel to">到着</div>
          <div class="rname empty" id="to-name">患者を選択してください</div>
          <div class="raddr" id="to-addr"></div>
        </div>

        <button class="nav-btn" id="nav-btn" onclick="openMaps()" disabled>
          🗺️ Google マップで案内
        </button>

      </div>
    </div>

  </div>

  <!-- 患者管理 -->
  <div id="manage-screen">
    <div class="manage-inner">

      <div class="card">
        <div class="card-header">患者を追加</div>
        <div class="card-body">
          <div class="form-row">
            <div class="fg">
              <label>患者名</label>
              <input type="text" id="new-name" placeholder="例：田中 花子 様" autocomplete="off">
            </div>
            <div class="fg" style="flex:2">
              <label>住所</label>
              <input type="text" id="new-addr" placeholder="例：東京都新宿区西新宿1-1-1" autocomplete="off">
            </div>
            <button class="add-btn" id="add-btn" onclick="addPatient()">＋ 追加</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="tbl-head">
          <div>患者名</div><div>住所</div><div></div>
        </div>
        <div id="patient-list"></div>
      </div>

    </div>
  </div>

</main>

<script>
const SUPABASE_URL = 'https://hnsvzhuxcyctblkahga.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhuc3Zodmh1eGN5Y3RibGthaGdhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NDExMDAsImV4cCI6MjA5NDExNzEwMH0.SYBiFwnOOoZibXrdEkP-afVOlIv2y1P_qYgxLn94YsA';

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let patients = [];
let fromIdx = null;
let toIdx = null;

/* ── データ読み込み ── */
async function load() {
  const { data, error } = await db
    .from('patients')
    .select('*')
    .order('sort_order', { ascending: true })
    .order('created_at', { ascending: true });

  if (error) { setStatus('err', '接続エラー'); return; }
  setStatus('ok', '同期中');
  patients = data || [];
  renderGrid();
  renderList();
}

/* ── 患者追加 ── */
async function addPatient() {
  const name    = document.getElementById('new-name').value.trim();
  const address = document.getElementById('new-addr').value.trim();
  if (!name || !address) { alert('患者名と住所を両方入力してください'); return; }

  const btn = document.getElementById('add-btn');
  btn.disabled = true; btn.textContent = '追加中...';

  const { error } = await db.from('patients').insert({ name, address });

  btn.disabled = false; btn.textContent = '＋ 追加';
  if (error) { alert('追加に失敗しました\n' + error.message); return; }

  document.getElementById('new-name').value = '';
  document.getElementById('new-addr').value = '';
  await load();
}

/* ── 患者削除 ── */
async function deletePatient(id) {
  const p = patients.find(x => x.id === id);
  if (!p || !confirm(`「${p.name}」を削除しますか？`)) return;

  const idx = patients.indexOf(p);
  const { error } = await db.from('patients').delete().eq('id', id);
  if (error) { alert('削除に失敗しました'); return; }

  if (fromIdx === idx) fromIdx = null;
  else if (fromIdx !== null && fromIdx > idx) fromIdx--;
  if (toIdx === idx) toIdx = null;
  else if (toIdx !== null && toIdx > idx) toIdx--;

  await load();
  updateDisplay();
}

/* ── リアルタイム同期（別PCでの変更を自動反映） ── */
db.channel('patients')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'patients' }, load)
  .subscribe();

/* ── UI描画 ── */
function setStatus(state, text) {
  const dot = document.getElementById('dot');
  dot.className = 'dot' + (state === 'ok' ? '' : state === 'err' ? ' err' : ' loading');
  document.getElementById('status-txt').textContent = text;
}

function showTab(tab) {
  document.getElementById('route-screen').style.display  = tab === 'route'  ? 'flex' : 'none';
  document.getElementById('manage-screen').style.display = tab === 'manage' ? 'block' : 'none';
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', tab === 'route' ? i === 0 : i === 1);
  });
}

function renderGrid() {
  const grid = document.getElementById('patient-grid');
  if (patients.length === 0) {
    grid.innerHTML = '<div class="empty-msg">患者が登録されていません<br>「患者管理」タブから追加してください</div>';
    return;
  }
  grid.innerHTML = '';
  patients.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'p-btn' + (i === fromIdx ? ' from-sel' : i === toIdx ? ' to-sel' : '');
    const badge = i === fromIdx ? '<span class="p-badge">出発</span>'
                : i === toIdx   ? '<span class="p-badge">到着</span>' : '';
    btn.innerHTML = `<span>${esc(p.name)}</span>${badge}`;
    btn.onclick = () => select(i);
    grid.appendChild(btn);
  });
}

function renderList() {
  const list = document.getElementById('patient-list');
  if (patients.length === 0) {
    list.innerHTML = '<div class="empty-msg">まだ患者が登録されていません</div>';
    return;
  }
  list.innerHTML = patients.map(p => `
    <div class="tbl-row">
      <div class="tbl-name">${esc(p.name)}</div>
      <div class="tbl-addr">${esc(p.address)}</div>
      <div><button class="del-btn" data-id="${p.id}">削除</button></div>
    </div>
  `).join('');
  list.querySelectorAll('.del-btn').forEach(btn => {
    btn.onclick = () => deletePatient(btn.dataset.id);
  });
}

function select(i) {
  if      (i === fromIdx)  fromIdx = null;
  else if (i === toIdx)    toIdx   = null;
  else if (fromIdx === null) fromIdx = i;
  else if (toIdx   === null) toIdx   = i;
  else                       toIdx   = i;
  updateDisplay();
  renderGrid();
}

function updateDisplay() {
  const setBox = (nameId, addrId, idx) => {
    const n = document.getElementById(nameId);
    const a = document.getElementById(addrId);
    if (idx !== null && patients[idx]) {
      n.textContent = patients[idx].name;
      n.classList.remove('empty');
      a.textContent = patients[idx].address;
    } else {
      n.textContent = '患者を選択してください';
      n.classList.add('empty');
      a.textContent = '';
    }
  };
  setBox('from-name', 'from-addr', fromIdx);
  setBox('to-name',   'to-addr',   toIdx);
  document.getElementById('nav-btn').disabled = fromIdx === null || toIdx === null;
}

function swapPatients() {
  [fromIdx, toIdx] = [toIdx, fromIdx];
  updateDisplay();
  renderGrid();
}

function openMaps() {
  if (fromIdx === null || toIdx === null) return;
  const o = encodeURIComponent(patients[fromIdx].address);
  const d = encodeURIComponent(patients[toIdx].address);
  window.open(`https://www.google.com/maps/dir/?api=1&origin=${o}&destination=${d}&travelmode=driving`, '_blank');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Enterキーで次へ / 追加 ── */
document.getElementById('new-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('new-addr').focus();
});
document.getElementById('new-addr').addEventListener('keydown', e => {
  if (e.key === 'Enter') addPatient();
});

/* ── 起動 ── */
load();
</script>
</body>
</html>
